<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Manual Operacional · SulSign OS</title>
<link href="https://fonts.googleapis.com/css2?family=DM%20Mono:wght@400;500&family=DM%20Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--black:#0f0f0f;--green:#2d6a4f;--ga:#52b788;--g100:#f5f5f5;--g200:#e8e8e8;--g400:#9e9e9e;--g600:#5a5a5a;--white:#fff;--red:#c62828;--ylw:#fff8e1;--ylwb:#ffc107;--roxo:#6a1b9a;--roxoBg:#f3e5f5;--azul:#1565c0;--azulBg:#e3f2fd;}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--g100);color:var(--black);font-size:14px;line-height:1.6;}
.hd{background:var(--black);padding:16px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
.hd-left{display:flex;align-items:center;gap:14px;}
.hd-logo{width:34px;height:34px;background:var(--ga);border-radius:6px;display:flex;align-items:center;justify-content:center;font-weight:900;color:var(--black);font-size:16px;}
.hd-title{color:#fff;font-size:14px;font-weight:700;}
.hd-sub{color:var(--g400);font-size:9px;letter-spacing:2px;text-transform:uppercase;margin-top:1px;}
.hd-search{background:#1a1a1a;border:1px solid #2a2a2a;border-radius:6px;padding:8px 14px;color:#fff;font-size:12px;width:260px;outline:none;}
.hd-search::placeholder{color:#666;}

.layout{display:flex;max-width:1280px;margin:0 auto;}

.sidebar{width:280px;flex-shrink:0;background:#fff;border-right:1px solid var(--g200);min-height:calc(100vh - 67px);position:sticky;top:67px;align-self:flex-start;overflow-y:auto;max-height:calc(100vh - 67px);}
.side-sec{padding:14px 18px 6px;font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--g400);}
.side-link{display:block;padding:9px 18px;font-size:12.5px;color:var(--black);text-decoration:none;border-left:3px solid transparent;cursor:pointer;transition:all .15s;}
.side-link:hover{background:var(--g100);}
.side-link.active{border-left-color:var(--ga);background:#eafaf1;color:var(--green);font-weight:600;}
.side-link .badge-mini{font-size:8px;padding:1px 5px;border-radius:2px;margin-left:6px;font-weight:700;vertical-align:middle;}

.content{flex:1;padding:32px 48px;max-width:880px;}
.section{display:none;}
.section.active{display:block;}

h1{font-size:24px;font-weight:700;margin-bottom:6px;border-bottom:3px solid var(--green);padding-bottom:14px;}
h2{font-size:18px;font-weight:700;color:var(--green);margin:28px 0 12px;}
h3{font-size:15px;font-weight:700;color:var(--g600);margin:20px 0 8px;}
p{margin-bottom:14px;font-size:13.5px;}
ul,ol{margin:0 0 16px 22px;}
li{margin-bottom:6px;font-size:13.5px;}

.publico-badge{display:inline-flex;align-items:center;gap:6px;background:var(--g100);padding:8px 14px;border-radius:6px;font-size:11px;font-weight:700;color:var(--black);margin-bottom:20px;}

.callout{border-radius:8px;padding:16px 18px;margin:18px 0;border-left:4px solid;}
.callout-title{font-weight:700;font-size:12.5px;margin-bottom:6px;display:flex;align-items:center;gap:6px;}
.callout.demo{background:var(--roxoBg);border-color:var(--roxo);}
.callout.demo .callout-title{color:var(--roxo);}
.callout.warn{background:#ffebee;border-color:var(--red);}
.callout.warn .callout-title{color:var(--red);}
.callout.info{background:var(--azulBg);border-color:var(--azul);}
.callout.info .callout-title{color:var(--azul);}

table{width:100%;border-collapse:collapse;margin:16px 0;font-size:12.5px;}
th{background:var(--black);color:#fff;text-align:left;padding:9px 12px;font-size:11px;text-transform:uppercase;letter-spacing:.5px;}
td{padding:8px 12px;border-bottom:1px solid var(--g200);}
tr:nth-child(even) td{background:var(--g100);}

.crumb{font-size:11px;color:var(--g400);margin-bottom:10px;}
.kbd{background:var(--g100);border:1px solid var(--g200);border-radius:3px;padding:1px 6px;font-family:'DM Mono',monospace;font-size:11px;}

@media print{ .sidebar,.hd{display:none;} .content{max-width:100%;} .section{display:block !important;page-break-after:always;} }

@media(max-width:900px){
  .sidebar{position:fixed;left:-280px;transition:left .2s;z-index:200;background:#fff;}
  .sidebar.open{left:0;box-shadow:4px 0 20px rgba(0,0,0,.2);}
  .content{padding:20px;}
  .hd-search{width:140px;}
  .menu-btn{display:block;background:none;border:none;color:#fff;font-size:20px;cursor:pointer;}
}
.menu-btn{display:none;}
</style>
</head>
<body>

<div class="hd">
  <div class="hd-left">
    <button class="menu-btn" onclick="document.querySelector('.sidebar').classList.toggle('open')">☰</button>
    <div class="hd-logo">S</div>
    <div>
      <div class="hd-title">Manual Operacional</div>
      <div class="hd-sub">SulSign OS</div>
    </div>
  </div>
  <input type="text" class="hd-search" id="busca" placeholder="🔍 Buscar no manual..." oninput="buscar(this.value)">
</div>

<div class="layout">
  <div class="sidebar" id="sidebar"></div>
  <div class="content" id="content"></div>
</div>

<script>
// ══════════════════════════════════════════════════════
// CONTEÚDO DO MANUAL
// ══════════════════════════════════════════════════════
var SECOES = [
  { grupo: "Início", id: "visao-geral", titulo: "Visão Geral do Sistema", publico: "Todos os perfis", corPublico: "g600",
    html: `
      <p>O SulSign OS é o sistema interno de gestão da Sul Sign Group. Ele cobre todo o ciclo de um job — desde o orçamento até o faturamento — e organiza a produção, o financeiro e a comunicação com produtores e profissionais de campo.</p>
      <p>O sistema é dividido em módulos independentes, cada um acessível por uma URL própria. Alguns exigem login (dados sensíveis), outros são acessados por link único sem senha (fluxo de campo).</p>
      <h2>Mapa dos Módulos</h2>
      <table>
        <tr><th>Módulo</th><th>Arquivo</th><th>Acesso</th><th>Quem usa</th></tr>
        <tr><td>Orçamentos</td><td>ORC_Manager.html</td><td>Login obrigatório</td><td>Gestor / Comercial</td></tr>
        <tr><td>Ordens de Serviço</td><td>SulSign_OS_Manager.html</td><td>Login obrigatório</td><td>Gestor / Produção</td></tr>
        <tr><td>Lançamentos Financeiros</td><td>Lancamentos.html</td><td>Login obrigatório</td><td>Financeiro / Gestor</td></tr>
        <tr><td>Painel Financeiro</td><td>Painel_Financeiro.html</td><td>Login obrigatório</td><td>Gestor / Financeiro</td></tr>
        <tr><td>Painel do Investidor</td><td>CEO_Dashboard.html</td><td>Login obrigatório</td><td>Sócio investidor</td></tr>
        <tr><td>Caixa de Produção</td><td>Caixa_Producao.html</td><td>Link com token</td><td>Produtor de campo</td></tr>
        <tr><td>Apontamento de Produção</td><td>Apontamento_Producao.html</td><td>Link com token</td><td>Profissional de disciplina</td></tr>
      </table>
      <h2>Fluxo de um Job</h2>
      <ol>
        <li>Orçamento criado no ORC_Manager — memorial de custo, proposta, BDI</li>
        <li>Orçamento aprovado pelo cliente → status muda para "Orçamento Aprovado"</li>

    `
  },

        <tr><th>Disciplina</th><th>O que é, no contexto Sul Sign</th></tr>
        <tr><td><b>Estruturas</b></td><td>Treliças e praticáveis de palco fabricados e montados pela própria Sul Sign. Não inclui estruturas de terceiros — essas são sempre fornecidas pelo cliente.</td></tr>

        <tr><td>Elétrica</td><td>Instalações elétricas — iluminação, fiação, comissionamento.</td></tr>
        <tr><td>Artes Plásticas</td><td>Modelagem, escultura, elementos cenográficos esculpidos.</td></tr>
        <tr><td>Arquitetura / Design</td><td>Projeto, briefing, conceito visual — fase de concepção, não de fabricação.</td></tr>

        <tr><td>Orçamento Recusado</td><td>Cliente recusou a proposta.</td></tr>
        <tr><td>Orçamento Vencido</td><td>Validade da proposta expirou sem resposta.</td></tr>
        <tr><td>Treinamento</td><td>Job fictício de demonstração/treino — isolado de todos os KPIs financeiros reais.</td></tr>
      </table>
    `
  },
  { grupo: "Comercial / Produção", id: "orcamentos", titulo: "Orçamentos (ORC_Manager)", publico: "Gestor / Comercial", corPublico: "azul",

      <p>O ORC_Manager é onde todo orçamento nasce. Ele organiza o memorial de custo, calcula a venda com BDI, e gera as visualizações para enviar ao cliente (Proposta, Descritivo) e para a equipe interna (Blocado, Estratificado).</p>

        <li>Preencha o cabeçalho: Cliente, Agência, Atendimento, Projeto, Ref.</li>

      <h2>BDI — Como a Venda é Calculada</h2>
      <table>
        <tr><th>Campo</th><th>Significado</th></tr>
        <tr><td>AC</td><td>Administração Central (%)</td></tr>
        <tr><td>DF</td><td>Despesas Financeiras (%)</td></tr>
        <tr><td>RI</td><td>Riscos (%)</td></tr>
        <tr><td>Lucro</td><td>Margem de lucro desejada (%)</td></tr>
        <tr><td>Impostos</td><td>Alíquota de impostos sobre a venda (%)</td></tr>
        <tr><td>BV / Comissão</td><td>Comissão de agência, quando aplicável (%)</td></tr>
      </table>
      <h2>Visualizações do Orçamento</h2>
      <table>
        <tr><th>Visualização</th><th>Para quem</th><th>O que mostra</th></tr>
        <tr><td>Memorial</td><td>Uso interno</td><td>Custo detalhado com BDI visível</td></tr>
        <tr><td>Proposta</td><td>Cliente</td><td>Valores de venda, sem detalhe de custo</td></tr>

      <h2>Revisões</h2>

      <h2>Gerar Ordens de Serviço</h2>
      <ul>
        <li><b>⚙ Gerar OS CV</b> — OS única, disciplina detectada automaticamente</li>
        <li><b>🏭 OS Setorial</b> — uma OS por disciplina marcada nos checkboxes (recomendado para jobs multi-disciplina)</li>
      </ul>
      <h2>Análise de Margem (Orçado × Real)</h2>
      <p>Aba "📊 Margem" compara planejado vs. gasto real, por categoria e disciplina. O botão "💸 + Custo Real" lança um gasto direto vinculado ao job.</p>
      <div class="callout demo"><div class="callout-title">🎓 Exemplo no job de treinamento</div>
        Abra <b>SS-TREINO-2026_06-99</b> no ORC_Manager. Tem 5 grupos cobrindo Serralheria, Marcenaria, Pintura, Logística e Estruturas. Abra a aba Margem para ver o comparativo já populado.</div>
    `

  { grupo: "Comercial / Produção", id: "ordens-servico", titulo: "Ordens de Serviço", publico: "Gestor / Produção", corPublico: "azul",

// RENDER
// ══════════════════════════════════════════════════════
var corMap = {
  azul: {bg:'#e3f2fd', fg:'#1565c0'}, ga: {bg:'#eafaf1', fg:'#2d6a4f'},
  roxo: {bg:'#f3e5f5', fg:'#6a1b9a'}, ylwb: {bg:'#fff8e1', fg:'#8a6d00'}, g600: {bg:'#f5f5f5', fg:'#5a5a5a'}
};

function renderSidebar(){
  var grupos = {};
  SECOES.forEach(function(s){
    if(!grupos[s.grupo]) grupos[s.grupo] = [];
    grupos[s.grupo].push(s);
  });
  var html = '';
  Object.keys(grupos).forEach(function(g){
    html += '<div class="side-sec">' + g + '</div>';
    grupos[g].forEach(function(s){
      html += '<a class="side-link" data-id="' + s.id + '" onclick="abrirSecao(\'' + s.id + '\')">' + s.titulo + '</a>';
    });
  });
  document.getElementById('sidebar').innerHTML = html;
}

function renderContent(){
  var html = '';
  SECOES.forEach(function(s, i){
    var cor = corMap[s.corPublico] || corMap.g600;
    html += '<div class="section" id="sec-' + s.id + '">';
    html += '<div class="crumb">Manual Operacional / ' + s.grupo + '</div>';
    html += '<h1>' + s.titulo + '</h1>';
    html += '<div class="publico-badge" style="background:' + cor.bg + ';color:' + cor.fg + ';">👤 PÚBLICO: ' + s.publico + '</div>';
    html += s.html;
    html += '</div>';
  });
  document.getElementById('content').innerHTML = html;
}

function abrirSecao(id){
  document.querySelectorAll('.section').forEach(function(el){ el.classList.remove('active'); });
  document.querySelectorAll('.side-link').forEach(function(el){ el.classList.remove('active'); });
  document.getElementById('sec-' + id).classList.add('active');
  document.querySelector('.side-link[data-id="' + id + '"]').classList.add('active');
  window.scrollTo(0,0);
  document.querySelector('.sidebar').classList.remove('open');
  history.replaceState(null, '', '#' + id);
}

function buscar(q){
  q = q.toLowerCase().trim();
  if(!q){ document.querySelectorAll('.side-link').forEach(function(el){ el.style.display='block'; }); return; }
  document.querySelectorAll('.side-link').forEach(function(el){
    var sec = SECOES.find(function(s){ return s.id === el.dataset.id; });
    var match = sec.titulo.toLowerCase().includes(q) || sec.html.toLowerCase().includes(q);
    el.style.display = match ? 'block' : 'none';
  });
}

renderSidebar();
renderContent();
var hashId = window.location.hash.replace('#','') || 'visao-geral';
if(!SECOES.find(function(s){return s.id===hashId;})) hashId = 'visao-geral';
abrirSecao(hashId);
</script>
