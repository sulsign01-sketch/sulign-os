<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Pagamentos — Sul Sign Group</title>
<style>
.pixbox{display:flex;align-items:center;gap:8px;background:#f5f5f5;border:1px solid #e0e0e0;border-radius:5px;padding:7px 9px;margin-top:7px;}
.pixlab{font-size:9px;font-weight:700;color:#888;letter-spacing:.5px;}
.pixval{flex:1;font-family:monospace;font-size:12px;word-break:break-all;color:#111;}
.btn-copy{border:none;background:#111;color:#fff;font-size:10px;font-weight:700;padding:5px 10px;border-radius:4px;cursor:pointer;flex-shrink:0;}
.cmp-box{margin-top:10px;padding-top:10px;border-top:1px dashed #ddd;}
.cmp-lab{font-size:10px;font-weight:700;color:#666;margin-bottom:5px;}
.cmp-file{font-size:11px;width:100%;}
.cmp-prev{max-width:100%;max-height:130px;border-radius:4px;margin-top:6px;display:none;}
.cmp-or{font-size:9px;color:#aaa;text-align:center;margin:7px 0;}
  *{box-sizing:border-box;margin:0;padding:0;}
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap');
  body{font-family:'DM Sans',system-ui,sans-serif;background:#0a0a0a;color:#e0e0e0;min-height:100vh;}

  .hd{background:#111;border-bottom:2px solid #ffcc02;padding:14px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
  .hd-title{font-size:13px;font-weight:700;color:#fff;letter-spacing:.5px;}
  .hd-sub{font-size:10px;color:#ffcc02;font-weight:600;letter-spacing:1px;text-transform:uppercase;}

  .hero{background:linear-gradient(135deg,#111 0%,#1f1a0d 100%);padding:22px 20px;border-bottom:1px solid #1a1a1a;}
  .hero-l{font-size:10px;color:#ffcc02;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:8px;}
  .hero-cards{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
  .hc{background:#0a0a0a;border-radius:6px;padding:12px;border:1px solid #1a1a1a;}
  .hc-l{font-size:9px;color:#666;font-weight:600;letter-spacing:1px;text-transform:uppercase;margin-bottom:4px;}
  .hc-v{font-family:'DM Mono',monospace;font-size:17px;font-weight:700;color:#fff;}
  .hc-v.amarelo{color:#ffcc02;}
  .hc-v.vermelho{color:#ef9a9a;}

  .lista{padding:16px;}
  .item{background:#111;border-radius:10px;border:1px solid #1a1a1a;padding:16px;margin-bottom:12px;}
  .item.pago{opacity:.45;}
  .item-top{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:8px;}
  .item-desc{font-size:14px;font-weight:700;color:#fff;}
  .item-fav{font-size:12px;color:#999;margin-top:2px;}
  .item-val{font-family:'DM Mono',monospace;font-size:16px;font-weight:700;color:#ffcc02;white-space:nowrap;}
  .item-venc{font-size:11px;margin-top:4px;}
  .item-venc.atrasado{color:#ef9a9a;font-weight:700;}
  .item-venc.hoje{color:#ffcc02;font-weight:700;}
  .item-venc.normal{color:#777;}
  .item-obs{font-size:11px;color:#888;margin-top:8px;padding-top:8px;border-top:1px solid #1a1a1a;}
  .item-tag{display:inline-block;font-size:9px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;padding:2px 8px;border-radius:20px;margin-top:8px;}
  .tag-pago{background:#0d2b1a;color:#00ff88;border:1px solid #1b5e20;}

  .btn-pagar{width:100%;margin-top:12px;padding:11px;background:#00ff88;border:none;border-radius:6px;color:#0a0a0a;font-size:12px;font-weight:700;cursor:pointer;letter-spacing:.5px;}
  .btn-pagar:disabled{opacity:.3;cursor:not-allowed;}

  .modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:999;align-items:flex-end;justify-content:center;}
  .modal.open{display:flex;}
  .sheet{background:#111;border-radius:16px 16px 0 0;width:100%;max-width:560px;padding:22px 20px;border-top:2px solid #00ff88;max-height:85vh;overflow-y:auto;}
  .sheet-title{font-size:14px;font-weight:700;color:#00ff88;margin-bottom:16px;}
  .fl{margin-bottom:14px;}
  .fl label{display:block;font-size:10px;font-weight:600;letter-spacing:.8px;text-transform:uppercase;color:#666;margin-bottom:5px;}
  .fl input,.fl textarea{width:100%;background:#0a0a0a;border:1.5px solid #222;border-radius:6px;padding:10px 12px;color:#e0e0e0;font-size:13px;font-family:inherit;outline:none;}
  .fl textarea{resize:vertical;min-height:60px;}
  .btn-row{display:flex;gap:10px;margin-top:8px;}
  .btn-cancel{flex:1;padding:12px;background:transparent;border:1.5px solid #333;border-radius:6px;color:#999;font-size:12px;font-weight:700;cursor:pointer;}
  .btn-confirm{flex:2;padding:12px;background:#00ff88;border:none;border-radius:6px;color:#0a0a0a;font-size:12px;font-weight:700;cursor:pointer;}

  .empty{text-align:center;padding:60px 20px;color:#555;font-size:13px;}
  .status{text-align:center;font-size:12px;margin-top:10px;min-height:16px;}
  .status.ok{color:#00ff88;}
  .status.err{color:#ef9a9a;}
</style>
</head>
<body>

<div class="hd">
  <div>
    <div class="hd-title">SUL SIGN GROUP</div>
    <div class="hd-sub">Pagamentos a Efetuar</div>
  </div>
</div>

<div class="hero" id="hero">
  <div class="hero-l">RESUMO</div>
  <div class="hero-cards">
    <div class="hc"><div class="hc-l">Pendente</div><div class="hc-v amarelo" id="h-pendente">—</div></div>
    <div class="hc"><div class="hc-l">Atrasados</div><div class="hc-v vermelho" id="h-atrasado">—</div></div>
  </div>
</div>

<div class="lista" id="lista">
  <div class="empty">Carregando...</div>
</div>

<!-- MODAL CONFIRMAR PAGAMENTO -->
<div class="modal" id="modal-pag">
  <div class="sheet">
    <div class="sheet-title">✓ Confirmar Pagamento</div>
    <div class="fl">
      <label>Data do pagamento</label>
      <input type="date" id="mp-data">
    </div>
    <div class="fl">
      <label>Observação (opcional)</label>
      <textarea id="mp-obs" placeholder="Ex: paguei via PIX pelo C6..."></textarea>
      <div class="cmp-box">
        <div class="cmp-lab">Comprovante (foto ou PDF)</div>
        <input type="file" id="mp-file" class="cmp-file" accept="image/*,application/pdf">
        <img id="mp-prev" class="cmp-prev">
        <div class="cmp-or">— ou —</div>
        <div class="cmp-lab">Link do Drive</div>
        <input type="text" id="mp-link" placeholder="https://drive.google.com/..." style="width:100%;font-size:12px;padding:6px;border:1px solid #ddd;border-radius:4px;">
      </div>
    </div>
    <div class="btn-row">
      <button class="btn-cancel" onclick="fecharModal()">Cancelar</button>
      <button class="btn-confirm" onclick="confirmarPagamento()">Confirmar</button>
    </div>
    <div class="status" id="mp-status">—</div>
  </div>
</div>

<script src="sulsign_core.js"></script>
<script>
var SUPA_URL =SulSignCore.SUPA_URL;
var SUPA_KEY =SulSignCore.SUPA_KEY;
var H = {'apikey':SUPA_KEY,'Authorization':'Bearer '+SUPA_KEY,'Content-Type':'application/json'};
var TOKEN = new URLSearchParams(window.location.search).get('token');
var CONTAS = [];
var _idAtual = null;

function fmt(v){return 'R$ '+parseFloat(v||0).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2});}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

async function init(){
  if(!TOKEN){
    document.getElementById('lista').innerHTML='<div class="empty">Link inválido. Peça um novo link ao Carlos.</div>';
    return;
  }
  await carregar();
}

async function carregar(){
  try{
    var r = await fetch(SUPA_URL+'/rest/v1/contas_pagar?select=*&token_ponde=eq.'+encodeURIComponent(TOKEN)+'&deletado_em=is.null&order=vencimento.asc',{headers:H});
    var data = await r.json();
    CONTAS = Array.isArray(data)?data:[];
    render();
  }catch(e){
    document.getElementById('lista').innerHTML='<div class="empty">Erro ao carregar: '+e.message+'</div>';
  }
}

function render(){
  var hoje = new Date(); hoje.setHours(0,0,0,0);
  var pendente=0, atrasado=0;
  CONTAS.forEach(function(c){
    if(c.pago_por_ponde || c.status==='Pago') return;
    var v = parseFloat(c.valor)||0;
    pendente += v;
    if(c.vencimento){
      var dv = new Date(c.vencimento+'T12:00:00');
      if(dv<hoje) atrasado += v;
    }
  });
  document.getElementById('h-pendente').textContent = fmt(pendente);
  document.getElementById('h-atrasado').textContent = fmt(atrasado);

  var lista = document.getElementById('lista');
  if(!CONTAS.length){
    lista.innerHTML = '<div class="empty">Nenhuma conta enviada para pagamento no momento.</div>';
    return;
  }

  var html = '';
  CONTAS.forEach(function(c){
    var pago = c.pago_por_ponde || c.status==='Pago';
    var v = parseFloat(c.valor)||0;
    var dv = c.vencimento ? new Date(c.vencimento+'T12:00:00') : null;
    var vencStr = dv ? dv.toLocaleDateString('pt-BR') : '—';
    var atrasado = dv && dv < hoje && !pago;
    var vencClass = atrasado ? 'atrasado' : (dv && dv.getTime()===hoje.getTime() ? 'hoje' : 'normal');

    html += '<div class="item'+(pago?' pago':'')+'">'
      +'<div class="item-top">'
        +'<div><div class="item-desc">'+esc(c.descricao)+'</div>'
          +(c.favorecido?'<div class="item-fav">Para: '+esc(c.favorecido)+'</div>':'')
        +'</div>'
        +'<div class="item-val">'+fmt(v)+'</div>'
      +'</div>'
      +'<div class="item-venc '+vencClass+'">'+(atrasado?'⚠ Venceu em ':'Vence em ')+vencStr
        +(c.numero_op?' &middot; <b>'+esc(c.numero_op)+'</b>':'')
        +(c.orcamento_numero&&c.orcamento_numero!=='SEM-JOB'?' &middot; '+esc(c.orcamento_numero):'')+'</div>'
      +(c.chave_pix?'<div class="pixbox"><div class="pixlab">'+esc((c.forma_pagamento||'PIX'))+'</div>'
        +'<div class="pixval" id="pix'+c.id+'">'+esc(c.chave_pix)+'</div>'
        +'<button class="btn-copy" onclick="copiar('+c.id+',this)">Copiar</button></div>':'')
      +(c.observacao?'<div class="item-obs">'+esc(c.observacao)+'</div>':'')
      +(pago
        ? '<div class="item-tag tag-pago">✓ Pago'+(c.data_pagamento?' em '+new Date(c.data_pagamento+'T12:00:00').toLocaleDateString('pt-BR'):'')+'</div>'
        : '<button class="btn-pagar" onclick="abrirModal(\''+c.id+'\')">✓ Marcar como Pago</button>')
      +'</div>';
  });
  lista.innerHTML = html;
}

function copiar(id,btn){
  var el=document.getElementById('pix'+id);
  if(!el)return;
  var txt=el.textContent;
  function ok(){ btn.textContent='Copiado!'; setTimeout(function(){btn.textContent='Copiar';},1500); }
  if(navigator.clipboard&&navigator.clipboard.writeText){
    navigator.clipboard.writeText(txt).then(ok,function(){fallback(txt,ok);});
  }else{ fallback(txt,ok); }
}
function fallback(txt,cb){
  var t=document.createElement('textarea');
  t.value=txt; t.style.position='fixed'; t.style.opacity='0';
  document.body.appendChild(t); t.select();
  try{ document.execCommand('copy'); cb(); }catch(e){ prompt('Copie:',txt); }
  document.body.removeChild(t);
}

function abrirModal(id){
  _idAtual = id;
  document.getElementById('mp-data').value = new Date().toISOString().split('T')[0];
  document.getElementById('mp-obs').value = '';
  document.getElementById('mp-file').value = '';
  document.getElementById('mp-link').value = '';
  document.getElementById('mp-prev').style.display='none';
  document.getElementById('mp-status').textContent = '—';
  document.getElementById('modal-pag').classList.add('open');
}

function fecharModal(){
  document.getElementById('modal-pag').classList.remove('open');
  _idAtual = null;
}

/* comprime imagem para ~200KB antes de guardar */
function comprimir(file){
  return new Promise(function(res,rej){
    if(file.type.indexOf('image/')!==0){
      var fr0=new FileReader();
      fr0.onload=function(){res(fr0.result);};
      fr0.onerror=rej; fr0.readAsDataURL(file);
      return;
    }
    var fr=new FileReader();
    fr.onload=function(){
      var img=new Image();
      img.onload=function(){
        var mx=1280, w=img.width, h=img.height;
        if(w>mx||h>mx){ var e=mx/Math.max(w,h); w=Math.round(w*e); h=Math.round(h*e); }
        var cv=document.createElement('canvas');
        cv.width=w; cv.height=h;
        cv.getContext('2d').drawImage(img,0,0,w,h);
        res(cv.toDataURL('image/jpeg',0.62));
      };
      img.onerror=rej; img.src=fr.result;
    };
    fr.onerror=rej; fr.readAsDataURL(file);
  });
}

function b64ToBlob(d){
  var p=d.split(','), m=p[0].match(/:(.*?);/)[1], b=atob(p[1]);
  var n=b.length, u=new Uint8Array(n);
  while(n--){ u[n]=b.charCodeAt(n); }
  return new Blob([u],{type:m});
}

document.getElementById('mp-file').addEventListener('change',function(){
  var f=this.files[0], pv=document.getElementById('mp-prev');
  if(!f||f.type.indexOf('image/')!==0){ pv.style.display='none'; return; }
  comprimir(f).then(function(d){ pv.src=d; pv.style.display='block'; });
});

async function confirmarPagamento(){
  if(!_idAtual) return;
  var data = document.getElementById('mp-data').value;
  var obs = document.getElementById('mp-obs').value.trim();
  var link = document.getElementById('mp-link').value.trim();
  var file = document.getElementById('mp-file').files[0];
  var st = document.getElementById('mp-status');
  if(!data){ st.textContent='Informe a data.'; st.className='status err'; return; }
  if(!file && !link){
    if(!confirm('Sem comprovante anexado. Confirmar mesmo assim?')) return;
  }

  st.textContent = 'Salvando...'; st.className = 'status';
  try{
    var comp = null;
    if(file){
      st.textContent='Enviando comprovante...';
      var d64 = await comprimir(file);
      var ext = file.type==='application/pdf' ? 'pdf' : 'jpg';
      var path = _idAtual+'_'+Date.now()+'.'+ext;
      var up = await fetch(SUPA_URL+'/storage/v1/object/comprovantes/'+path,{
        method:'POST',
        headers:{'apikey':SUPA_KEY,'Authorization':'Bearer '+SUPA_KEY},
        body: b64ToBlob(d64)
      });
      if(up.ok){ comp = path; }
      else { comp = d64; }  /* fallback: base64 comprimido */
      st.textContent='Salvando...';
    }
    var body = {
      pago_por_ponde: true,
      status: 'Pago',
      data_pagamento: data,
      obs_ponde: obs
    };
    if(comp) body.comprovante_ponde = comp;
    if(link) body.comprovante_link = link;

    var r = await fetch(SUPA_URL+'/rest/v1/contas_pagar?id=eq.'+_idAtual, {
      method:'PATCH', headers:H,
      body: JSON.stringify(body)
    });
    if(!r.ok) throw new Error('HTTP '+r.status);
    st.textContent = '✓ Confirmado!'; st.className = 'status ok';
    setTimeout(function(){
      fecharModal();
      carregar();
    }, 700);
  }catch(e){
    st.textContent = '✗ '+e.message; st.className = 'status err';
  }
}

init();
</script>
</body>
</html>
