<title>SulSign OS — Book Manager</title>
<!--
═══════════════════════════════════════════════════════════════
 SULSIGN OS — BOOK MANAGER (Book de Artes / Medidas / Manual)
 Gera documento técnico de produção paginado A4:
   capa automática → 1 página por item → página final
 Diagrama técnico gerado por SVG (área visual + sangria).
 Slots de imagem: render (referência visual) e arte final.
 Salva/carrega no Supabase (tabela books_artes, upsert por numero).
 Importa grupos de um orçamento existente (tabela orcamentos).

 SQL DA TABELA (rodar uma vez no Supabase SQL Editor):
 ─────────────────────────────────────────────────────
 create table if not exists books_artes (
   id bigint generated by default as identity primary key,
   numero text unique not null,
   titulo text,
   tipo text default 'artes',
   dados jsonb not null,
   criado_em timestamptz default now(),
   atualizado_em timestamptz default now(),
   deletado_em timestamptz
 );
 alter table books_artes enable row level security;
 create policy "anon all books_artes" on books_artes
   for all using (true) with check (true);
 ─────────────────────────────────────────────────────
═══════════════════════════════════════════════════════════════
-->

<style>
:root{
  --verde:#2F6B50;
  --verde-escuro:#245240;
  --verde-claro:#E8F3ED;
  --verde-linha:#3E8266;
  --tinta:#1A1F1C;
  --cinza:#8A938E;
  --cinza-claro:#EDEFEE;
  --papel:#FFFFFF;
  --fundo:#DDE2DF;
  --alerta:#B8860B;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--fundo);font-family:'Courier New',Courier,monospace;color:var(--tinta);}
h1,h2,h3,.titulo-display{font-family:'Arial Narrow','Helvetica Neue Condensed',Arial,sans-serif;font-stretch:condensed;}

/* ══ TOOLBAR ══ */
#toolbar{position:sticky;top:0;z-index:50;background:var(--verde-escuro);color:#fff;
  padding:10px 14px;display:flex;flex-wrap:wrap;gap:8px;align-items:center;box-shadow:0 2px 8px rgba(0,0,0,.25);}
#toolbar .marca{font-family:'Arial Narrow',Arial,sans-serif;font-weight:bold;letter-spacing:2px;font-size:15px;margin-right:8px;}
#toolbar button, #toolbar select{
  background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.35);color:#fff;
  font-family:inherit;font-size:12px;padding:7px 11px;border-radius:4px;cursor:pointer;}
#toolbar button:hover{background:rgba(255,255,255,.25);}
#toolbar select option{color:#111;}
#status-msg{font-size:11px;margin-left:auto;opacity:.85;max-width:340px;}

/* ══ PÁGINAS A4 ══ */
#doc{padding:24px 8px 80px;display:flex;flex-direction:column;align-items:center;gap:24px;}
.page{width:210mm;min-height:297mm;background:var(--papel);position:relative;
  box-shadow:0 4px 18px rgba(0,0,0,.18);overflow:hidden;}

/* campos editáveis */
[contenteditable]{outline:none;min-width:20px;}
[contenteditable]:hover{background:rgba(47,107,80,.07);}
[contenteditable]:focus{background:rgba(47,107,80,.12);box-shadow:0 0 0 1px var(--verde-linha);}
[contenteditable]:empty:before{content:attr(data-ph);color:#B7BFBA;}

/* ══ CAPA ══ */
.capa{display:flex;}
.capa-faixa{width:58mm;background:var(--verde);color:#fff;display:flex;flex-direction:column;
  justify-content:space-between;padding:14mm 8mm;}
.capa-logo-slot{width:42mm;min-height:16mm;cursor:pointer;}
.capa-logo-slot img{max-width:100%;max-height:22mm;display:block;}
.capa-logo-txt{font-family:'Arial Narrow',Arial,sans-serif;font-weight:bold;font-size:18px;letter-spacing:3px;}
.capa-logo-txt small{display:block;font-size:8px;letter-spacing:6px;font-weight:normal;opacity:.8;margin-top:2px;}
.capa-rev{margin-top:auto;}
.capa-rev .rot{font-size:9px;letter-spacing:4px;opacity:.75;}
.capa-rev .val{font-family:'Arial Narrow',Arial,sans-serif;font-weight:bold;font-size:44px;line-height:1;}
.capa-rodape-faixa{font-size:8px;letter-spacing:3px;opacity:.6;line-height:1.7;}
.capa-corpo{flex:1;padding:16mm 14mm;display:flex;flex-direction:column;}
.capa-eyebrow{font-size:10px;letter-spacing:4px;color:var(--verde);font-weight:bold;}
.capa-titulo{font-size:36px;font-weight:bold;margin-top:6mm;line-height:1.05;}
.capa-sub{font-size:13px;color:var(--cinza);margin-top:3mm;}
.capa-grid{margin-top:auto;margin-bottom:30mm;display:grid;grid-template-columns:1fr 1fr;gap:7mm 10mm;}
.campo-v{border-left:3px solid var(--verde);padding-left:4mm;}
.campo-v .rot{font-size:8px;letter-spacing:2px;color:var(--cinza);display:block;margin-bottom:1mm;}
.campo-v .val{font-size:12.5px;font-weight:bold;}
.capa-rodape{border-top:1px solid var(--cinza-claro);padding-top:4mm;font-size:8.5px;
  letter-spacing:2px;color:var(--cinza);}

/* ══ PÁGINA DE ITEM ══ */
.pg-head{display:flex;align-items:center;gap:5mm;padding:7mm 10mm 4mm;border-bottom:2px solid var(--tinta);}
.pg-cod{font-family:'Arial Narrow',Arial,sans-serif;font-weight:bold;font-size:22px;color:var(--verde);
  border-right:1.5px solid var(--cinza-claro);padding-right:5mm;}
.pg-titulo{font-family:'Arial Narrow',Arial,sans-serif;font-weight:bold;font-size:14.5px;flex:1;text-transform:uppercase;}
.pg-proj{font-size:9px;color:var(--cinza);white-space:nowrap;}
.pg-rev{background:var(--verde-escuro);color:#fff;font-size:9px;font-weight:bold;
  padding:2px 6px;border-radius:3px;}
.pg-corpo{display:flex;padding:6mm 10mm 0;gap:0;}
.col-esq{width:62mm;border-right:1px solid var(--cinza-claro);padding-right:6mm;}
.col-dir{flex:1;padding-left:7mm;}
.sec-rot{font-size:8px;letter-spacing:3px;color:var(--cinza);border-bottom:1px solid var(--cinza-claro);
  padding-bottom:1.5mm;margin:6mm 0 3mm;}
.sec-rot:first-child{margin-top:0;}
.spec .rot{font-size:7.5px;letter-spacing:1.5px;color:var(--cinza);margin-top:3mm;}
.spec .val{font-size:11.5px;font-weight:bold;text-transform:uppercase;line-height:1.35;}
.dim-box{background:var(--cinza-claro);padding:3mm 4mm;margin-top:2.5mm;border-radius:2px;}
.dim-box.destaque{background:var(--verde-claro);}
.dim-box .rot{font-size:7.5px;letter-spacing:1.5px;color:var(--cinza);}
.dim-box .val{font-size:16px;font-weight:bold;display:flex;align-items:baseline;gap:4px;}
.dim-box .val span[contenteditable]{min-width:30px;display:inline-block;text-align:right;}
.obs-txt{font-size:11px;font-weight:bold;text-transform:uppercase;line-height:1.5;}
.inst-txt{font-size:10.5px;line-height:1.65;white-space:pre-wrap;}
.diagrama-wrap{min-height:64mm;display:flex;align-items:center;justify-content:center;}
.img-slot{border:1.5px dashed #C4CCC7;border-radius:4px;min-height:48mm;display:flex;
  align-items:center;justify-content:center;cursor:pointer;color:#AEB6B1;font-size:11px;
  text-align:center;padding:4mm;position:relative;}
.img-slot img{max-width:100%;max-height:88mm;display:block;border-radius:4px;}
.img-slot.tem-img{border:none;padding:0;min-height:0;}
.img-slot .btn-x{position:absolute;top:4px;right:4px;background:rgba(0,0,0,.55);color:#fff;
  border:none;border-radius:3px;font-size:10px;padding:2px 6px;cursor:pointer;display:none;}
.img-slot.tem-img:hover .btn-x{display:block;}
.pg-foot{position:absolute;bottom:0;left:0;right:0;padding:4mm 10mm;font-size:7.5px;
  letter-spacing:2px;color:#B7BFBA;display:flex;justify-content:space-between;
  border-top:1px solid var(--cinza-claro);background:#fff;}

/* controles do item (some no print) */
.item-ctrl{position:absolute;top:6mm;right:3mm;display:flex;flex-direction:column;gap:4px;}
.item-ctrl button{background:#fff;border:1px solid #C4CCC7;border-radius:4px;width:26px;height:26px;
  cursor:pointer;font-size:12px;color:#556;}
.item-ctrl button:hover{background:var(--verde-claro);border-color:var(--verde);}

/* ══ PÁGINA FINAL ══ */
.final{background:var(--verde);color:#fff;display:flex;flex-direction:column;
  align-items:center;justify-content:center;text-align:center;padding:20mm;}
.final .logo-area{margin-bottom:10mm;cursor:pointer;}
.final .logo-area img{max-height:20mm;}
.final h2{font-size:34px;margin-bottom:8mm;}
.final .msg{font-size:11.5px;line-height:1.8;max-width:120mm;opacity:.85;}
.final .badge{background:rgba(255,255,255,.14);border-radius:6px;padding:6mm 12mm;margin-top:12mm;}
.final .badge .t{font-family:'Arial Narrow',Arial,sans-serif;font-weight:bold;font-size:16px;}
.final .badge .s{font-size:10px;opacity:.7;margin-top:1.5mm;}
.final .contatos{margin-top:16mm;padding-top:6mm;border-top:1px solid rgba(255,255,255,.25);
  display:flex;gap:16mm;font-size:10px;}
.final .contatos .rot{font-size:7.5px;letter-spacing:3px;opacity:.55;display:block;margin-bottom:1mm;}

/* ══ MODAL ══ */
#modal-fundo{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:100;display:none;
  align-items:center;justify-content:center;padding:16px;}
#modal-fundo.aberto{display:flex;}
#modal-caixa{background:#fff;border-radius:8px;max-width:460px;width:100%;max-height:80vh;
  overflow:auto;padding:18px;}
#modal-caixa h3{font-size:15px;margin-bottom:10px;color:var(--verde-escuro);}
#modal-caixa .op{padding:9px 10px;border:1px solid var(--cinza-claro);border-radius:5px;
  margin-bottom:6px;cursor:pointer;font-size:12px;}
#modal-caixa .op:hover{background:var(--verde-claro);border-color:var(--verde);}
#modal-caixa .op small{color:var(--cinza);display:block;font-size:10px;}
#modal-caixa input[type=text]{width:100%;font-family:inherit;font-size:12px;padding:8px;
  border:1px solid #C4CCC7;border-radius:5px;margin-bottom:10px;}
#modal-caixa .fechar{background:none;border:none;float:right;font-size:16px;cursor:pointer;color:var(--cinza);}
#modal-caixa .pills{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px;}
#modal-caixa .pill{font-size:10.5px;padding:4px 10px;border:1px solid #C4CCC7;border-radius:12px;cursor:pointer;color:#556;}
#modal-caixa .pill.ativo{background:var(--verde);border-color:var(--verde);color:#fff;}
#modal-caixa .st-badge{font-size:9px;border:1px solid #C4CCC7;border-radius:3px;padding:1px 5px;margin-left:6px;color:#8A938E;white-space:nowrap;}
#modal-caixa .st-badge.ok{border-color:var(--verde);color:var(--verde);background:var(--verde-claro);}

/* botão flutuante add */
#btn-add-flutuante{position:fixed;bottom:22px;right:22px;z-index:60;background:var(--verde);
  color:#fff;border:none;border-radius:50%;width:54px;height:54px;font-size:26px;cursor:pointer;
  box-shadow:0 4px 14px rgba(0,0,0,.3);}

/* ══ PRINT ══ */
@page{size:A4;margin:0;}
.so-print{display:none;}
.indice-lista{display:flex;flex-wrap:wrap;gap:1.5mm;}
.indice-item{flex:1 1 calc(50% - 1mm);max-width:calc(50% - 1mm);display:flex;align-items:baseline;gap:3mm;
  padding:2mm 3mm;background:var(--cinza-claro);border-radius:2px;cursor:pointer;}
.indice-item:hover{background:var(--verde-claro);}
.ind-cod{font-family:'Courier New',monospace;font-weight:bold;font-size:10px;white-space:nowrap;}
.ind-nome{font-size:10px;font-weight:bold;flex:1;}
.ind-setor{font-size:8px;color:var(--cinza);white-space:nowrap;}
.box-imp .val{color:#C0271D;}
.img-multi{display:flex;flex-wrap:wrap;gap:2mm;}
.img-multi .img-slot{flex:1 1 100%;}
.img-multi.varias .img-slot.tem-img{flex:1 1 calc(50% - 1mm);max-width:calc(50% - 1mm);}
.img-multi.varias .img-slot.tem-img img{max-height:44mm;object-fit:contain;}
.img-slot.slot-add{min-height:12mm;font-size:9px;flex:1 1 100%;}

/* ══════════ FORMATO PAISAGEM · CADERNO DE IMPRESSÃO E MONTAGEM ══════════ */
body.fmt-pais .page{width:297mm;min-height:210mm;}
body.fmt-pais .capa-faixa{width:74mm;}
body.fmt-pais .capa-grid{grid-template-columns:1fr 1fr 1fr;margin-bottom:12mm;}
body.fmt-pais .final .contatos{margin-top:10mm;}

.cad-top{display:flex;align-items:center;justify-content:space-between;padding:5mm 8mm 3mm;}
.cad-tit{font-family:Arial,Helvetica,sans-serif;font-weight:bold;font-size:10.5px;text-transform:uppercase;color:#111;}
.cad-logo{width:38mm;height:11mm;display:flex;align-items:center;justify-content:flex-end;cursor:pointer;}
.cad-logo img{max-width:100%;max-height:11mm;}
.cad-logo .txt{font-family:'Arial Narrow',Arial,sans-serif;font-weight:bold;font-size:17px;letter-spacing:1px;color:#111;text-align:right;line-height:1;}
.cad-logo .txt small{display:block;font-size:6px;letter-spacing:3px;font-weight:normal;color:#777;margin-top:1px;}
.cad-barra{height:3.2mm;background:#111;}

.cad-corpo{display:flex;min-height:184mm;position:relative;}
.cad-badge{position:absolute;left:6mm;top:21mm;width:9mm;height:9mm;border-radius:50%;color:#fff;z-index:4;
  font-family:Arial,Helvetica,sans-serif;font-weight:bold;font-size:11px;display:flex;align-items:center;justify-content:center;}
.cad-col{width:56mm;margin-left:19mm;border-right:1px solid #C9C9C9;padding-right:4mm;padding-bottom:4mm;position:relative;}
.cad-aba{background:#D8D8D8;width:calc(100% + 21mm);margin-right:-17mm;padding:3.2mm 4mm 3.2mm 4mm;
  -webkit-clip-path:polygon(0 0,100% 0,calc(100% - 9mm) 100%,0 100%);clip-path:polygon(0 0,100% 0,calc(100% - 9mm) 100%,0 100%);}
.cad-f{background:#F1F1F1;padding:2mm 4mm;margin-top:1.2mm;}
.cad-f .rot,.cad-aba .rot{font-family:Arial,Helvetica,sans-serif;font-size:7px;font-weight:bold;letter-spacing:.3px;color:#222;}
.cad-f .val,.cad-aba .val{font-family:Arial,Helvetica,sans-serif;font-size:9.5px;font-weight:bold;text-transform:uppercase;line-height:1.3;margin-top:.7mm;color:#111;}
.cad-f.vermelho{background:#F1F1F1;}
.cad-f.vermelho .rot,.cad-f.vermelho .val{color:#E01B24;}

.cad-area{flex:1;position:relative;padding:4mm 8mm 4mm 7mm;}
.cad-render{position:absolute;top:3mm;right:8mm;width:62mm;}
.cad-render .base{position:relative;line-height:0;cursor:pointer;}
.cad-render .base img{width:100%;display:block;}
.cad-render .marca{position:absolute;border:1.6px dashed #22C3DD;box-sizing:border-box;}
.cad-render .cap{font-family:Arial,Helvetica,sans-serif;font-size:7.5px;font-weight:bold;margin-top:1.2mm;color:#111;}
.cad-render .cap span{display:block;text-decoration:underline;}
.cad-render .cap small{display:block;font-size:6.5px;font-weight:bold;margin-top:.4mm;}
.cad-ctrl{margin-top:1.5mm;display:flex;gap:4px;flex-wrap:wrap;}
.cad-ctrl button{font-family:inherit;font-size:9px;padding:3px 7px;border:1px solid #C4CCC7;background:#fff;border-radius:4px;cursor:pointer;color:#556;}
.cad-ctrl button:hover{background:var(--verde-claro);border-color:var(--verde);}
.cad-vazio{border:1.5px dashed #C4CCC7;border-radius:5px;min-height:34mm;display:flex;align-items:center;justify-content:center;

.cad-desenho{position:absolute;left:7mm;right:8mm;top:58mm;height:82mm;display:flex;align-items:center;justify-content:center;}
.cad-desenho svg{max-width:100%;max-height:82mm;}
.cad-aviso{position:absolute;right:8mm;bottom:6mm;width:120mm;background:#FBE4E6;border-radius:6px;padding:3mm 5mm;
  font-family:Arial,Helvetica,sans-serif;font-size:8px;line-height:1.5;color:#E01B24;text-align:center;}
.cad-aviso b{color:#C0182B;font-weight:bold;}

.cad-aba-solo{background:#DCDCDC;width:78mm;margin-top:0;padding:3.2mm 4mm 3.2mm 19mm;
  font-family:Arial,Helvetica,sans-serif;font-weight:bold;font-size:9.5px;text-transform:uppercase;color:#111;
  -webkit-clip-path:polygon(0 0,100% 0,calc(100% - 10mm) 100%,0 100%);clip-path:polygon(0 0,100% 0,calc(100% - 10mm) 100%,0 100%);}
.cad-palco{padding:4mm 12mm;display:flex;align-items:center;justify-content:center;min-height:150mm;}
.cad-palco img{max-width:100%;max-height:150mm;display:block;}
.cad-planta{position:relative;display:inline-block;line-height:0;}
.cad-planta img{max-width:100%;max-height:132mm;display:block;}
.pin{position:absolute;width:7mm;height:7mm;border-radius:50%;color:#fff;text-decoration:none;
  font-family:Arial,Helvetica,sans-serif;font-weight:bold;font-size:9px;display:flex;align-items:center;justify-content:center;
  transform:translate(-50%,-50%);cursor:pointer;box-shadow:0 1px 3px rgba(0,0,0,.35);}
.pin-bar{padding:2mm 19mm;display:flex;gap:6px;align-items:center;flex-wrap:wrap;font-size:11px;color:#556;}
.pin-bar button{font-family:inherit;font-size:10px;padding:4px 9px;border:1px solid #C4CCC7;background:#fff;border-radius:4px;cursor:pointer;color:#556;}
.pin-bar button.on{background:var(--verde);border-color:var(--verde);color:#fff;}
.pin-chip{font-size:9.5px;padding:3px 8px;border-radius:11px;color:#fff;cursor:pointer;opacity:.45;font-family:Arial,Helvetica,sans-serif;font-weight:bold;}
.pin-chip.armado{opacity:1;box-shadow:0 0 0 2px #111;}
.cad-legenda{padding:3mm 19mm;display:flex;flex-wrap:wrap;gap:1.5mm;}
.cad-legenda .lg{display:flex;align-items:center;gap:2mm;flex:1 1 calc(33.33% - 1mm);max-width:calc(33.33% - 1mm);
  background:#F1F1F1;padding:1.5mm 2mm;border-radius:2px;cursor:pointer;font-family:Arial,Helvetica,sans-serif;}
.cad-legenda .n{width:5mm;height:5mm;border-radius:50%;color:#fff;font-size:8px;font-weight:bold;
  display:flex;align-items:center;justify-content:center;flex:0 0 auto;}
.cad-legenda .c{font-size:8px;font-weight:bold;white-space:nowrap;}
.cad-legenda .t{font-size:8px;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.pg-cad .item-ctrl{top:auto;bottom:5mm;left:4mm;right:auto;flex-direction:row;}

@media print{
  .so-print{display:inline !important;}
  body.fmt-pais .page{width:297mm;height:210mm;}
  .cad-ctrl,.pin-bar,.cad-vazio{display:none !important;}
  .cad-legenda .lg{cursor:default;}
  .pin{box-shadow:none;}
  .pg-indice.sem-planta{display:none;}
  .indice-item{cursor:default;}
  body{background:#fff;}
  #toolbar,#btn-add-flutuante,.item-ctrl,#modal-fundo{display:none !important;}
  #doc{padding:0;gap:0;}
  .page{box-shadow:none;page-break-after:always;width:210mm;height:297mm;min-height:0;}
  .page:last-child{page-break-after:auto;}
  .img-slot:not(.tem-img){display:none;}
  .sec-oculta-print{display:none;}
  [contenteditable]:empty{display:none;}
  [contenteditable]:hover,[contenteditable]:focus{background:none;box-shadow:none;}
  .capa-logo-slot:not(.tem-img) .capa-logo-txt{display:block;}
}
@media (max-width:820px){
  #doc{align-items:flex-start;overflow-x:auto;}
}
</style>

<script>

/* ═══ UTIL ═══ */
function esc(t){ return String(t==null?'':t).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function num(v){ var n = parseFloat(String(v).replace(',','.')); return isNaN(n)?0:n; }
function fmtDim(v){ return (Math.round(v*10)/10).toString().replace('.',','); }
function msg(t){ var el=document.getElementById('status-msg'); el.textContent=t; setTimeout(function(){ if(el.textContent===t) el.textContent=''; },6000); }
function impressa(it){
  if(it.impManual) return { L:num(it.impL), A:num(it.impA) };
  return { L:num(it.visL)+2*num(it.sangria), A:num(it.visA)+2*num(it.sangria) };
}
function codigoAuto(i){ var n=i+1; return 'P'+(n<10?'0':'')+n; }

/* Código automático: sigla do nome da peça (1ª letra + 2 consoantes) + sequencial por sigla.
   Ex.: BACKDROP→BCK-01, TOTEM→TTM-01, 2º TOTEM→TTM-02. Editável: se preenchido manual, respeita. */
function siglaDe(nome){
  var s = String(nome||'').toUpperCase();
  try{ s = s.normalize('NFD').replace(/[\u0300-\u036f]/g,''); }catch(e){}
  s = s.replace(/[^A-Z0-9]/g,'');
  if(!s) return 'PC';
  var sig = s.charAt(0), i2, c;
  for(i2=1; i2<s.length && sig.length<3; i2++){
    c = s.charAt(i2);
    if('AEIOU'.indexOf(c)===-1) sig += c;
  }
  if(sig.length<3) sig = (s+'XX').substring(0,3);
  return sig;
}
function codigoLogico(idx){
  var sig = siglaDe(S.itens[idx].nome), n=1, j;
  for(j=0; j<idx; j++){
    if(!String(S.itens[j].codigo||'').trim() && siglaDe(S.itens[j].nome)===sig) n++;
  }
  return sig+'-'+(n<10?'0':'')+n;
}

/* Imagens como array (retrocompatível com string dos books antigos) */
function imgsDe(it, campo){

  if(v) return [v];
  return [];
}

/* ═══ FORMAS DA ÁREA VISUAL (faca permanece retangular = bounding box L×A) ═══ */
var FORMAS = {
  ret:     { lbl:'Retângulo',         p1:null },
  trap:    { lbl:'Trapézio',          p1:'BASE MENOR / TOPO (CM)' },
  tri:     { lbl:'Triângulo',         p1:null },
  elipse:  { lbl:'Elipse / Círculo',  p1:null },
  telhado: { lbl:'Telhado (5 lados)', p1:'ALTURA DA PAREDE (CM)' },
  arco:    { lbl:'Arco (topo curvo)', p1:'ALTURA DA PARTE RETA (CM)' }
};
function formaDe(it){ return (it && FORMAS[it.forma]) ? it.forma : 'ret'; }
function fp1Valida(it){
  var f=formaDe(it), L=num(it.visL), A=num(it.visA), p=num(it.fp1);
  if(f==='trap'){ if(p<=0||p>L) p=L; return p; }
  if(f==='telhado'||f==='arco'){ if(p<0) p=0; if(p>A) p=A; return p; }
  return 0;
}
function areaVisual(it){
  var f=formaDe(it), L=num(it.visL), A=num(it.visA), p=fp1Valida(it);
  if(f==='trap')    return (L+p)/2*A;
  if(f==='tri')     return L*A/2;
  if(f==='elipse')  return Math.PI*L*A/4;
  if(f==='telhado') return L*p + L*(A-p)/2;
  if(f==='arco')    return L*p + Math.PI*L*(A-p)/4;
  return L*A;
}
function fmtM2(cm2){ return (cm2/10000).toFixed(2).replace('.',','); }
function pathForma(it, x, y, w, h){
  var f=formaDe(it), L=num(it.visL)||1, A=num(it.visA)||1, p=fp1Valida(it);
  if(f==='trap'){
    var tw=(p/L)*w, off=(w-tw)/2;
    return 'M'+x+' '+(y+h)+' L'+(x+off)+' '+y+' L'+(x+off+tw)+' '+y+' L'+(x+w)+' '+(y+h)+' Z';
  }
  if(f==='tri') return 'M'+x+' '+(y+h)+' L'+(x+w/2)+' '+y+' L'+(x+w)+' '+(y+h)+' Z';
  if(f==='elipse'){
    var cx=x+w/2, cy=y+h/2, rx=w/2, ry=h/2;
    return 'M'+(cx-rx)+' '+cy+' A'+rx+' '+ry+' 0 1 0 '+(cx+rx)+' '+cy+' A'+rx+' '+ry+' 0 1 0 '+(cx-rx)+' '+cy+' Z';
  }
  if(f==='telhado'){
    var yp = y + h*(1 - (A>0?p/A:0));
    return 'M'+x+' '+(y+h)+' L'+x+' '+yp+' L'+(x+w/2)+' '+y+' L'+(x+w)+' '+yp+' L'+(x+w)+' '+(y+h)+' Z';
  }
  if(f==='arco'){
    var yr = y + h*(1 - (A>0?p/A:0));
    var ry2 = Math.max(0.01, yr - y);
    return 'M'+x+' '+(y+h)+' L'+x+' '+yr+' A'+(w/2)+' '+ry2+' 0 0 1 '+(x+w)+' '+yr+' L'+(x+w)+' '+(y+h)+' Z';
  }
  return null;
}

/* ═══ DIAGRAMA SVG ═══ */
function svgDiagrama(it){
  var imp = impressa(it);
  var L=imp.L||1, A=imp.A||1;
  var boxW=340, boxH=250, pad=52;
  var esc_ = Math.min((boxW-pad*2)/L,(boxH-pad*2)/A);
  var w=L*esc_, h=A*esc_;
  var x=(boxW-w)/2, y=(boxH-h)/2;
  /* margem da sangria dentro do retângulo impresso */
  var mL = it.impManual ? Math.max(0,(imp.L-num(it.visL))/2)*esc_ : num(it.sangria)*esc_;
  var mA = it.impManual ? Math.max(0,(imp.A-num(it.visA))/2)*esc_ : num(it.sangria)*esc_;
  var s = '';
  s += '<svg width="100%" viewBox="0 0 '+boxW+' '+boxH+'" xmlns="http://www.w3.org/2000/svg" style="max-width:340px">';
  /* área impressa (externa) */
  s += '<rect x="'+x+'" y="'+y+'" width="'+w+'" height="'+h+'" fill="#EAF6EF" stroke="#3A4540" stroke-width="1.4"/>';
  /* hachura leve */
  s += '<defs><pattern id="hx" width="7" height="7" patternTransform="rotate(45)" patternUnits="userSpaceOnUse"><line x1="0" y1="0" x2="0" y2="7" stroke="#CBE8D6" stroke-width="1.4"/></pattern></defs>';
  s += '<rect x="'+x+'" y="'+y+'" width="'+w+'" height="'+h+'" fill="url(#hx)" opacity="0.8"/>';
  /* área visual (interna tracejada) — forma real */
  var vx=x+mL, vy=y+mA, vw=w-2*mL, vh=h-2*mA;
  var fpath = pathForma(it, vx, vy, vw, vh);
  if(fpath){
    /* bounding box de referência bem leve + forma em destaque */
    s += '<rect x="'+vx+'" y="'+vy+'" width="'+vw+'" height="'+vh+'" fill="none" stroke="#9DBFAE" stroke-width="0.8" stroke-dasharray="2 3"/>';
    s += '<path d="'+fpath+'" fill="#FFFFFF" fill-opacity="0.55" stroke="#2F6B50" stroke-width="1.6" stroke-dasharray="6 4"/>';
    /* cota do parâmetro extra */
    var ff=formaDe(it), pp=fp1Valida(it), Lr=num(it.visL)||1, Ar=num(it.visA)||1;
    if(ff==='trap'){
      var tw=(pp/Lr)*vw, off=(vw-tw)/2;
      s += '<text x="'+(vx+vw/2)+'" y="'+(vy-5)+'" text-anchor="middle" font-size="9" font-family="Courier New" fill="#2F6B50">'+fmtDim(pp)+' cm</text>';
      s += '<line x1="'+(vx+off)+'" y1="'+(vy-2)+'" x2="'+(vx+off+tw)+'" y2="'+(vy-2)+'" stroke="#2F6B50" stroke-width="0.8"/>';
    }
    if(ff==='telhado'||ff==='arco'){
      var yp2 = vy + vh*(1 - (Ar>0?pp/Ar:0));
      s += '<line x1="'+(vx+vw+3)+'" y1="'+yp2+'" x2="'+(vx+vw+3)+'" y2="'+(vy+vh)+'" stroke="#2F6B50" stroke-width="0.8"/>';
      s += '<text x="'+(vx+vw+8)+'" y="'+((yp2+vy+vh)/2+3)+'" font-size="9" font-family="Courier New" fill="#2F6B50">'+fmtDim(pp)+'</text>';
    }
  }else{
    s += '<rect x="'+vx+'" y="'+vy+'" width="'+vw+'" height="'+vh+'" fill="none" stroke="#2F6B50" stroke-width="1.6" stroke-dasharray="6 4"/>';
  }
  /* cota horizontal (embaixo) */
  var cy = y+h+16;
  s += '<line x1="'+x+'" y1="'+cy+'" x2="'+(x+w)+'" y2="'+cy+'" stroke="#3A4540" stroke-width="1"/>';
  s += '<line x1="'+x+'" y1="'+(cy-4)+'" x2="'+x+'" y2="'+(cy+4)+'" stroke="#3A4540" stroke-width="1"/>';
  s += '<line x1="'+(x+w)+'" y1="'+(cy-4)+'" x2="'+(x+w)+'" y2="'+(cy+4)+'" stroke="#3A4540" stroke-width="1"/>';
  s += '<text x="'+(x+w/2)+'" y="'+(cy+15)+'" text-anchor="middle" font-size="11" font-family="Courier New" fill="#3A4540">'+fmtDim(imp.L)+' cm</text>';
  /* cota vertical (esquerda) */
  var cx = x-16;
  s += '<line x1="'+cx+'" y1="'+y+'" x2="'+cx+'" y2="'+(y+h)+'" stroke="#3A4540" stroke-width="1"/>';
  s += '<line x1="'+(cx-4)+'" y1="'+y+'" x2="'+(cx+4)+'" y2="'+y+'" stroke="#3A4540" stroke-width="1"/>';
  s += '<line x1="'+(cx-4)+'" y1="'+(y+h)+'" x2="'+(cx+4)+'" y2="'+(y+h)+'" stroke="#3A4540" stroke-width="1"/>';
  s += '<text x="'+(cx-8)+'" y="'+(y+h/2)+'" text-anchor="middle" font-size="11" font-family="Courier New" fill="#3A4540" transform="rotate(-90 '+(cx-8)+' '+(y+h/2)+')">'+fmtDim(imp.A)+' cm</text>';
  s += '</svg>';
  return s;
}

/* ═══════════════════════════════════════════════════════════════════
   CADERNO DE IMPRESSÃO E MONTAGEM  ·  formato paisagem (A4 deitado)
   ═══════════════════════════════════════════════════════════════════ */
var AVISO_PADRAO = 'FECHAR ARQUIVO EM PDF NO TAMANHO DA DIMENSÃO FINAL, EM ESCALA REAL OU 1:10. NÃO COLOCAR MARCA DE CORTE NEM MARCAÇÕES DE PROJEÇÃO DE OBJETOS NO ARQUIVO.';
var PALETA = ['#C0182B','#8E44AD','#4FC3D9','#F0C419','#5FBF60','#1B2A6B','#E5197F','#DDA05F',
              '#EFC2D3','#4A0E4E','#1B6B3A','#3FBFAD','#F26522','#F0705A','#9B59B6','#A0785A'];
var pinModo = false, pinArmado = -1, marcCtx = null;

function corItem(i){ var it=S.itens[i]; return (it && it.cor) ? it.cor : PALETA[i % PALETA.length]; }

/* garante os campos novos em books antigos */
function normaliza(){
  if(!S.formato) S.formato = 'paisagem';
  if(!Array.isArray(S.renders)) S.renders = [];
  if(!S.aviso) S.aviso = AVISO_PADRAO;
  if(!S.tituloCaderno) S.tituloCaderno = 'CADERNO DE IMPRESSÃO E MONTAGEM';
  if(S.logoCab===undefined) S.logoCab = '';
  for(var i=0;i<S.itens.length;i++){
    var it = S.itens[i];
    if(!Array.isArray(it.refRects)) it.refRects = [];
    if(!Array.isArray(it.pins)) it.pins = [];
    if(it.refSrc===undefined) it.refSrc = '';
    if(it.cor===undefined) it.cor = '';
  }
}

/* render de referência do item: 'b:n' = render do book, 'i:n' = render próprio */
function refImg(it){
  var s = String(it.refSrc||''), pr = s.charAt(0), n = parseInt(s.substring(2),10);
  var proprios = imgsDe(it,'render');
  if(pr==='i' && proprios[n]) return proprios[n];
  if(pr==='b' && S.renders[n]) return S.renders[n];
  if(proprios.length) return proprios[0];
  if(S.renders.length) return S.renders[0];
  return '';
}

/* ═══ DESENHO TÉCNICO DO CADERNO ═══
   Mesma engine de sempre, no traço da referência:
   retângulo vermelho tracejado = dimensão final (faca) · preto sólido = área visível. */
function svgCaderno(it){
  var imp = impressa(it);
  var LF = imp.L||1, AF = imp.A||1;
  var LV = num(it.visL)||LF, AV = num(it.visA)||AF;
  if(LV>LF) LV=LF;
  if(AV>AF) AV=AF;
  var W=640, H=320, mL=125, mR=35, mT=78, mB=32;
  var e = Math.min((W-mL-mR)/LF, (H-mT-mB)/AF);
  var wf=LF*e, hf=AF*e;
  var x = mL + ((W-mL-mR)-wf)/2, y = mT + ((H-mT-mB)-hf)/2;
  var wv=LV*e, hv=AV*e;
  var xv = x+(wf-wv)/2, yv = y+(hf-hv)/2;
  var R='#E01B24', K='#111', F='Courier New,monospace';
  var s = '<svg viewBox="0 0 '+W+' '+H+'" xmlns="http://www.w3.org/2000/svg">';
  /* linhas de chamada */
  s += '<line x1="'+x+'" y1="'+(y-52)+'" x2="'+x+'" y2="'+y+'" stroke="'+R+'" stroke-width="0.5"/>';
  s += '<line x1="'+(x+wf)+'" y1="'+(y-52)+'" x2="'+(x+wf)+'" y2="'+y+'" stroke="'+R+'" stroke-width="0.5"/>';
  s += '<line x1="'+(x-58)+'" y1="'+y+'" x2="'+x+'" y2="'+y+'" stroke="'+R+'" stroke-width="0.5"/>';
  s += '<line x1="'+(x-58)+'" y1="'+(y+hf)+'" x2="'+x+'" y2="'+(y+hf)+'" stroke="'+R+'" stroke-width="0.5"/>';
  /* dimensão final (faca) */
  s += '<rect x="'+x+'" y="'+y+'" width="'+wf+'" height="'+hf+'" fill="none" stroke="'+R+'" stroke-width="1.2" stroke-dasharray="8 5"/>';
  /* área visível */
  s += '<rect x="'+xv+'" y="'+yv+'" width="'+wv+'" height="'+hv+'" fill="#FFFFFF" stroke="'+K+'" stroke-width="1.3"/>';
  /* cotas horizontais (topo) */
  s += cotaH(x, x+wf, y-48, fmtDim(LF), R, F, K);
  s += cotaH(xv, xv+wv, y-24, fmtDim(LV), K, F, K);
  /* cotas verticais (esquerda) */
  s += cotaV(y, y+hf, x-54, fmtDim(AF), R, F, K);
  s += cotaV(yv, yv+hv, x-26, fmtDim(AV), K, F, K);
  s += '</svg>';
  return s;
}
function cotaH(x1,x2,yy,txt,cor,F,K){
  return '<line x1="'+x1+'" y1="'+yy+'" x2="'+x2+'" y2="'+yy+'" stroke="'+cor+'" stroke-width="0.9"/>'+
    '<circle cx="'+x1+'" cy="'+yy+'" r="2.4" fill="'+cor+'"/><circle cx="'+x2+'" cy="'+yy+'" r="2.4" fill="'+cor+'"/>'+
    '<text x="'+((x1+x2)/2)+'" y="'+(yy-7)+'" text-anchor="middle" font-family="'+F+'" font-size="17" fill="'+K+'">'+txt+'</text>';
}
function cotaV(y1,y2,xx,txt,cor,F,K){
  var my=(y1+y2)/2;
  return '<line x1="'+xx+'" y1="'+y1+'" x2="'+xx+'" y2="'+y2+'" stroke="'+cor+'" stroke-width="0.9"/>'+
    '<circle cx="'+xx+'" cy="'+y1+'" r="2.4" fill="'+cor+'"/><circle cx="'+xx+'" cy="'+y2+'" r="2.4" fill="'+cor+'"/>'+
    '<text x="'+(xx-8)+'" y="'+my+'" text-anchor="middle" font-family="'+F+'" font-size="17" fill="'+K+'" transform="rotate(-90 '+(xx-8)+' '+my+')">'+txt+'</text>';
}

function desenhaMarcas(prev){
  var ov = document.getElementById('marc-ov');
  if(!ov || !marcCtx) return;
  var h='', k, r;
  for(k=0;k<marcCtx.rects.length;k++){
    r = marcCtx.rects[k];
    h += '<div class="marca-e" data-action="marc-del" data-k="'+k+'" style="position:absolute;left:'+(r.x*100)+'%;top:'+(r.y*100)+
         '%;width:'+(r.w*100)+'%;height:'+(r.h*100)+'%;border:2px dashed #22C3DD;background:rgba(34,195,221,.14);cursor:pointer"></div>';
  }
  if(prev && prev.x1!==undefined){
    var x=Math.min(prev.x0,prev.x1), y=Math.min(prev.y0,prev.y1);
    h += '<div style="position:absolute;left:'+(x*100)+'%;top:'+(y*100)+'%;width:'+(Math.abs(prev.x1-prev.x0)*100)+
         '%;height:'+(Math.abs(prev.y1-prev.y0)*100)+'%;border:2px dashed #F26522;pointer-events:none"></div>';
  }
  ov.innerHTML = h;
}
function ligarMarcador(){
  var wrap = document.getElementById('marc-wrap');
  if(!wrap) return;
  var arr = null;
  function pos(e){
    var r = wrap.getBoundingClientRect();
    return { x: Math.min(1,Math.max(0,(e.clientX-r.left)/r.width)),
             y: Math.min(1,Math.max(0,(e.clientY-r.top)/r.height)) };
  }
  wrap.addEventListener('pointerdown', function(e){
    if(e.target && e.target.className==='marca-e') return;
    var p = pos(e);
    arr = { x0:p.x, y0:p.y };
    try{ wrap.setPointerCapture(e.pointerId); }catch(err){}
    e.preventDefault();
  });
  wrap.addEventListener('pointermove', function(e){
    if(!arr) return;
    var p = pos(e);
    arr.x1 = p.x; arr.y1 = p.y;
    desenhaMarcas(arr);
    e.preventDefault();
  });
  wrap.addEventListener('pointerup', function(e){
    if(!arr) return;
    var a = arr; arr = null;
    if(a.x1===undefined){ desenhaMarcas(); return; }
    var w = Math.abs(a.x1-a.x0), hh = Math.abs(a.y1-a.y0);
    if(w>0.015 && hh>0.015){
      marcCtx.rects.push({ x:Math.min(a.x0,a.x1), y:Math.min(a.y0,a.y1), w:w, h:hh });
    }
    desenhaMarcas();
  });
  wrap.addEventListener('pointercancel', function(){ arr=null; desenhaMarcas(); });
}

/* ═══ AÇÕES ═══ */
document.addEventListener('click', function(ev){
  var el = ev.target.closest('[data-action]');
  if(!el) return;
  var ac = el.getAttribute('data-action');
  var idx = parseInt(el.getAttribute('data-idx')||'-1',10);

  if(ac==='novo'){ if(confirm('Começar um documento novo? Alterações não salvas serão perdidas.')){ S = estadoInicial(); render(); } }
  else if(ac==='add-item'){ S.itens.push(itemNovo()); render(); window.scrollTo(0, document.body.scrollHeight - 1400); }
  else if(ac==='del-item'){ if(confirm('Excluir este item?')){ S.itens.splice(idx,1); if(!S.itens.length) S.itens.push(itemNovo()); render(); } }
  else if(ac==='duplicar-item'){ S.itens.splice(idx+1,0,JSON.parse(JSON.stringify(S.itens[idx]))); S.itens[idx+1].codigo=''; render(); }
  else if(ac==='mover-cima'){ if(idx>0){ var t=S.itens[idx-1]; S.itens[idx-1]=S.itens[idx]; S.itens[idx]=t; render(); } }
  else if(ac==='mover-baixo'){ if(idx<S.itens.length-1){ var t2=S.itens[idx+1]; S.itens[idx+1]=S.itens[idx]; S.itens[idx]=t2; render(); } }
  else if(ac==='mudar-tipo'){ /* handled em change */ }
  else if(ac==='toggle-manual'){
    var it = S.itens[idx];
    it.impManual = el.checked;
    if(it.impManual){ var imp = impressa({visL:it.visL,visA:it.visA,sangria:it.sangria,impManual:false}); it.impL=imp.L; it.impA=imp.A; }
    render();
  }
  else if(ac==='upload-img'){ imgAlvo = { idx: idx, campo: el.getAttribute('data-campo') }; document.getElementById('input-img').click(); }
  else if(ac==='upload-logo'){ imgAlvo = { idx:-1, campo:'logo' }; document.getElementById('input-img').click(); }
  else if(ac==='upload-planta'){ imgAlvo = { idx:-2, campo:'planta' }; document.getElementById('input-img').click(); }
  else if(ac==='upload-logo-cab'){ imgAlvo = { idx:-4, campo:'logoCab' }; document.getElementById('input-img').click(); }
  else if(ac==='upload-render-book'){ imgAlvo = { idx:-3, campo:'renderbook' }; fecharModal(); document.getElementById('input-img').click(); }
  else if(ac==='remover-render-book'){
    var kb = parseInt(el.getAttribute('data-k')||'0',10);
    S.renders.splice(kb,1);
    for(var ib=0; ib<S.itens.length; ib++){
      var sb = String(S.itens[ib].refSrc||'');
      if(sb.charAt(0)==='b'){
        var nb = parseInt(sb.substring(2),10);
        if(nb===kb) S.itens[ib].refSrc='';
        else if(nb>kb) S.itens[ib].refSrc='b:'+(nb-1);
      }
    }
    render();
  }
  else if(ac==='mudar-formato'){ S.formato = (S.formato==='paisagem') ? 'retrato' : 'paisagem'; render(); window.scrollTo(0,0); }
  else if(ac==='marcar-render'){ abrirMarcador(idx); }
  else if(ac==='trocar-render'){ trocarRender(idx); }
  else if(ac==='ref-set'){ S.itens[idx].refSrc = el.getAttribute('data-src'); fecharModal(); render(); }
  else if(ac==='marc-del'){ ev.stopPropagation(); marcCtx.rects.splice(parseInt(el.getAttribute('data-k'),10),1); desenhaMarcas(); }
  else if(ac==='marc-limpar'){ marcCtx.rects = []; desenhaMarcas(); }
  else if(ac==='marc-ok'){ S.itens[marcCtx.idx].refRects = marcCtx.rects; marcCtx = null; fecharModal(); renderMantendo(); }
  else if(ac==='pin-modo'){ pinModo = !pinModo; if(!pinModo) pinArmado=-1; renderMantendo(); }
  else if(ac==='pin-armar'){ pinArmado = idx; renderMantendo(); }
  else if(ac==='pin'){
    if(pinModo){
      ev.preventDefault(); ev.stopPropagation();
      S.itens[idx].pins.splice(parseInt(el.getAttribute('data-k'),10),1);
      renderMantendo();
    }
  }
  else if(ac==='planta-clique'){
    if(pinModo && pinArmado>=0){
      var rp = el.getBoundingClientRect();
      S.itens[pinArmado].pins.push({
        x: Math.min(1,Math.max(0,(ev.clientX-rp.left)/rp.width)),
        y: Math.min(1,Math.max(0,(ev.clientY-rp.top)/rp.height)) });
      renderMantendo();
    }else if(!pinModo){
      msg('Ligue "posicionar pinos" para marcar itens na planta.');
    }
  }
  else if(ac==='remover-planta'){ ev.stopPropagation(); imgAlvo={idx:-2,campo:'planta'}; document.getElementById('input-img').click(); }
  else if(ac==='ir-item'){ var alvoPg = document.getElementById('pg-item-'+idx) || document.querySelector('.pg-item[data-idx="'+idx+'"]'); if(alvoPg) alvoPg.scrollIntoView({behavior:'smooth'}); }
  else if(ac==='remover-img'){ ev.stopPropagation();
    var cmp = el.getAttribute('data-campo');
    var pos = parseInt(el.getAttribute('data-pos')||'0',10);
    var lst = imgsDe(S.itens[idx], cmp).slice();
    lst.splice(pos,1);
    S.itens[idx][cmp] = lst;
    render(); }
  else if(ac==='salvar'){ salvar(); }
  else if(ac==='carregar'){ carregarLista(); }
  else if(ac==='baixar'){ baixarHTML(); }
  else if(ac==='gerar-lg'){ gerarLG(); }
  else if(ac==='imprimir'){ window.print(); }
  else if(ac==='importar-orc'){ importarOrcPrompt(); }
  else if(ac==='fechar-modal'){ fecharModal(); }
  else if(ac==='fechar-modal-fundo'){ if(ev.target.id==='modal-fundo') fecharModal(); }
});

/* ═══ UPLOAD DE IMAGEM (redimensiona p/ não estourar o Supabase) ═══ */
document.getElementById('input-img').addEventListener('change', function(){
  var arquivos = Array.prototype.slice.call(this.files||[]); this.value='';
  if(!arquivos.length || !imgAlvo) return;
  var alvo = imgAlvo; imgAlvo=null;
  if(alvo.campo==='logo' || alvo.campo==='logoCab' || alvo.campo==='planta') arquivos = arquivos.slice(0,1);
  var pendentes = arquivos.length;
  function umPronto(){ pendentes--; if(pendentes<=0) render(); }
  function processa(f){
    var leitor = new FileReader();
    leitor.onload = function(e){
      var img = new Image();
      img.onload = function(){
        var MAX = 1400;
        var w=img.width, h=img.height;
        if(w>MAX || h>MAX){ var r=Math.min(MAX/w,MAX/h); w=Math.round(w*r); h=Math.round(h*r); }
        var cv = document.createElement('canvas'); cv.width=w; cv.height=h;
        cv.getContext('2d').drawImage(img,0,0,w,h);
        var ehPng = (alvo.campo==='logo' || alvo.campo==='logoCab');
        var data = ehPng ? cv.toDataURL('image/png') : cv.toDataURL('image/jpeg',0.82);
        if(alvo.campo==='logo'){ S.logo = data; }
        else if(alvo.campo==='logoCab'){ S.logoCab = data; }
        else if(alvo.campo==='planta'){ S.planta = data; }
        else if(alvo.campo==='renderbook'){ S.renders.push(data); }
        else{
          var lst = imgsDe(S.itens[alvo.idx], alvo.campo).slice();
          lst.push(data);
          S.itens[alvo.idx][alvo.campo] = lst;
        }
        umPronto();
      };
      img.onerror = umPronto;
      img.src = e.target.result;
    };
    leitor.onerror = umPronto;
    leitor.readAsDataURL(f);
  }
  for(var fi=0; fi<arquivos.length; fi++) processa(arquivos[fi]);
});

/* ═══ SUPABASE ═══ */
function req(metodo, caminho, corpo){
  return fetch(SUPA_URL+'/rest/v1/'+caminho, {
    method: metodo,
    headers: {
      'apikey': SUPA_KEY, 'Authorization':'Bearer '+SUPA_KEY,
      'Content-Type':'application/json', 'Prefer':'return=representation'
    },
    body: corpo ? JSON.stringify(corpo) : undefined
  }).then(function(r){
    if(!r.ok) return r.text().then(function(t){ throw new Error(r.status+': '+t); });
    return r.status===204 ? null : r.json();
  });
}

function salvar(){
  if(!S.numero || S.numero==='SS-2026_00-00'){
    var n = prompt('Número do documento (ex.: SS-2026_06-19):', S.numero);
    if(!n) return; S.numero = n; render();
  }
  msg('Salvando…');
  req('GET','books_artes?numero=eq.'+encodeURIComponent(S.numero)+'&select=id')
  .then(function(rows){
    var corpo = { numero:S.numero, titulo:S.titulo, tipo:S.tipo, dados:S, atualizado_em:new Date().toISOString() };
    if(rows && rows.length){
      return req('PATCH','books_artes?numero=eq.'+encodeURIComponent(S.numero), corpo);
    }
    return req('POST','books_artes', corpo);
  })
  .then(function(){ msg('✔ Salvo: '+S.numero); })
  .catch(function(e){
    if(String(e).indexOf('relation')>-1 || String(e).indexOf('404')>-1 || String(e).indexOf('42P01')>-1){
      msg('⚠ Tabela books_artes não existe — rode o SQL do cabeçalho deste arquivo no Supabase.');
    } else msg('⚠ Erro ao salvar: '+e.message);
  });
}

var _orcListaCache=[];
var _orcFiltroStatus='';
var PILLS_STATUS=['','Faturado','Pago','Aprovado','Em Produção','Entregue'];

  msg('Buscando orçamentos…');

function montarModalOrc(){
  var h='<button class="fechar" data-action="fechar-modal">✕</button><h3>Importar de orçamento</h3>'+
    '<input type="text" id="orc-busca" placeholder="Filtrar por número, cliente ou projeto…">'+
    '<div class="pills" id="orc-pills">'+montarPillsOrc()+'</div>'+
    '<div id="orc-lista">'+montarListaOrc('')+'</div>';

}
function montarPillsOrc(){
  var h='';
  for(var i=0;i<PILLS_STATUS.length;i++){
    var p=PILLS_STATUS[i];
    h+='<span class="pill'+(_orcFiltroStatus===p?' ativo':'')+'" data-pill="'+p+'">'+(p||'Todos')+'</span>';
  }
  return h;
}
function montarListaOrc(q){
  q=(q||'').toLowerCase();
  var rows=_orcListaCache.filter(function(r){
    if(_orcFiltroStatus && (r.status||'')!==_orcFiltroStatus) return false;
    if(q && ((r.numero||'')+' '+(r.cliente||'')+' '+(r.projeto||'')).toLowerCase().indexOf(q)<0) return false;
    return true;
  });
  if(!rows.length) return '<div style="font-size:11px;color:#8A938E;padding:8px 2px">Nenhum orçamento neste filtro.</div>';
  var h='';
  rows.slice(0,60).forEach(function(r){
    var ok=(r.status==='Faturado'||r.status==='Pago');
    h+='<div class="op" data-importa-orc="'+esc(r.numero)+'"><b>'+esc(r.numero)+'</b> — '+esc(r.projeto||r.cliente||'')+
       (r.status?'<span class="st-badge'+(ok?' ok':'')+'">'+esc(r.status)+'</span>':'')+
       '<small>'+esc(r.cliente||'')+' · '+String(r.updated_at||'').slice(0,10)+'</small></div>';
  });
  return h;
}
function ligarModalOrc(){
  var inp=document.getElementById('orc-busca');
  if(!inp) return;
  inp.addEventListener('input',function(){
    var lista=document.getElementById('orc-lista');
    if(lista) lista.innerHTML=montarListaOrc(inp.value);
  });
  inp.addEventListener('keydown',function(e){
    if(e.key==='Enter'&&inp.value.trim().toUpperCase().indexOf('SS-')===0){ fecharModal(); importarOrc(inp.value.trim()); }
  });
}

function importarOrc(numero){
  msg('Importando '+numero+'…');
  req('GET','orcamentos?numero=eq.'+encodeURIComponent(numero)+'&select=*')
  .then(function(rows){
    if(!rows || !rows.length){ msg('⚠ Orçamento '+numero+' não encontrado.'); return; }
    var o = rows[0];
    var d = o.dados || o.json || o; /* jsonb ou colunas diretas */
    S.numero  = numero;
    S.titulo  = d.projeto || d.titulo || o.projeto || o.titulo || S.titulo;
    S.cliente = d.cliente || o.cliente || S.cliente;
    S.agencia = d.agencia || o.agencia || S.agencia;
    var grupos = d.grupos || [];
    /* imagens e descrições do Estratificado, chaveadas por tblN (N = ordem do grupo) */
    var estrImgs =(d.estr&&d.estr.imagens)||{};
    var estrDescs=(d.estr&&d.estr.descricoes)||{};
    var chavesImg=Object.keys(estrImgs).sort(function(a,b){return num(a.replace(/\D/g,''))-num(b.replace(/\D/g,''));});
    if(grupos.length){
      var novos = [];
      for(var i=0;i<grupos.length;i++){
        var g = grupos[i];
        if(g.opcional) continue;
        var it = itemNovo();
        it.nome = g.nome || g.titulo || ('Grupo '+(i+1));
        /* dimensão-mestre do ORC: campo "dim" texto ("3,60 x 0,50" / "2x1,5m") */
        var L = 0, A = 0;
        var m = String(g.dim||'').match(/([\d.,]+)\s*[x×X]\s*([\d.,]+)/);
        if(m){ L = num(m[1]); A = num(m[2]); }
        if(!L) L = num(g.mL || g.largura || g.larg || 0);
        if(!A) A = num(g.mA || g.altura || g.alt || 0);
        /* medidas do ORC ficam em metros — converte para cm se pequeno */
        if(L>0 && L<=12) L = L*100;
        if(A>0 && A<=12) A = A*100;
        if(L>0) it.visL = L;
        if(A>0) it.visA = A;
        /* material principal = linha de maior valor do grupo */
        if(g.linhas && g.linhas.length){
          var melhor=g.linhas[0], vMax=-1;
          g.linhas.forEach(function(ln){
            var v=(parseFloat(ln.qtd)||0)*(parseFloat(ln.unit)||0);
            if(v>vMax){vMax=v;melhor=ln;}
          });
          it.material = (melhor.desc || melhor.nome || '').toUpperCase();
        }
        /* render + observações vindos do Estratificado do ORC */
        var chave='tbl'+(i+1);
        var img=estrImgs[chave]||((chavesImg.length===grupos.length)?estrImgs[chavesImg[i]]:null);
        if(img) it.render=[img];
        var dsc=estrDescs[chave]||((chavesImg.length===grupos.length&&estrDescs[chavesImg[i]])?estrDescs[chavesImg[i]]:'');
        if(dsc) it.obs=dsc;
        novos.push(it);
      }
      if(novos.length) S.itens = novos;
    }
    render();
    msg('✔ Importado: '+numero+' ('+S.itens.length+' itens) — revise materiais e medidas.');
  })
  .catch(function(e){ msg('⚠ '+e.message); });
}

/* ═══ MODAL ═══ */
function abrirModal(html){ document.getElementById('modal-caixa').innerHTML=html; document.getElementById('modal-fundo').classList.add('aberto'); }
function fecharModal(){ document.getElementById('modal-fundo').classList.remove('aberto'); }

/* ═══ BAIXAR HTML (com estado embutido) ═══ */
/* ═══ GERAR LG (Logística de Coleta Gráfica) ═══
   Exporta JSON no formato do LG_Generator.html: {header, itens}.
   Medidas = área IMPRESSA (c/ sangria). Itens cuja estrutura sugere
   apenas estrutura física continuam na lista — apagar no LG se não for gráfica. */
function gerarLG(){
  var itensLG = S.itens.map(function(it){
    var imp = impressa(it);
    var mat = ((it.substrato||'')+' — '+(it.material||it.nome||'')).replace(/^ — /,'').replace(/ — $/,'');
    return { mat: mat.toUpperCase(), l: Math.round(imp.L), a: Math.round(imp.A),
             q: parseFloat(String(it.qtd).replace(',','.'))||1,
             acab: (it.obs||'').toUpperCase().slice(0,80) };
  });
  var payload = {
    header:{
      coleta:'MUBISYS', evento:(S.numero||'')+' — '+(S.titulo||''),
      endColeta:'', entrega:'SUL SIGN — Benfica', endEntrega:'',
      os:(S.numero||'')+'_LG01',
      prazo:'', obs:'Gerado automaticamente do book '+(S.numero||'')+' '+(S.revisao||'')
    },
    itens: itensLG
  };
  /* entrega direta: grava o payload e abre o gerador já montado.
     localStorage (nao sessionStorage) p/ funcionar mesmo se o popup for
     bloqueado e o usuario abrir o LG na mao depois. */
  try{ localStorage.setItem('ss_lg_payload', JSON.stringify(payload)); }catch(e){}
  var w = window.open('LG_Generator.html','_blank');
  if(!w){
    /* popup bloqueado: cai no download do JSON como antes */
    var a=document.createElement('a');
    a.href=URL.createObjectURL(new Blob([JSON.stringify(payload,null,1)],{type:'application/json'}));
    a.download='LG_'+(S.numero||'book')+'.json';
    document.body.appendChild(a); a.click();
    setTimeout(function(){ URL.revokeObjectURL(a.href); a.remove(); },500);
    msg('Popup bloqueado — JSON baixado. Abra o LG_Generator e importe.');
    return;
  }
  msg('LG aberta em nova aba com os itens do book.');
}

function baixarHTML(){
  var clone = document.documentElement.cloneNode(true);
  var seedEl = clone.querySelector('#seed');
  seedEl.textContent = JSON.stringify(S);
  var blob = new Blob(['<!DOCTYPE html>\n'+clone.outerHTML], {type:'text/html'});
  var a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = (S.numero||'BOOK')+'_'+TIPOS[S.tipo].book.replace(/ /g,'_')+'_'+S.revisao+'.html';
  a.click();
  setTimeout(function(){ URL.revokeObjectURL(a.href); },2000);
}

render();
