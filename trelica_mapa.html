<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PDVEX · Mapa de Montagem de Treliça</title>
<style>
:root{--verde:#2F6B50;--escuro:#245240;--tinta:#1A1F1C;--cinza:#8A938E;--claro:#EDEFEE;--papel:#fff;--fundo:#DDE2DF;--alerta:#B8860B;--erro:#C0392B;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--fundo);font-family:'Courier New',monospace;color:var(--tinta);padding:18px;}
h1,h2{font-family:'Arial Narrow',Arial,sans-serif;}
.top{background:var(--escuro);color:#fff;padding:12px 16px;border-radius:6px 6px 0 0;display:flex;align-items:baseline;gap:12px;flex-wrap:wrap;}
.top .m{font-weight:bold;letter-spacing:2px;}
.top small{opacity:.75;font-size:11px;}
.wrap{max-width:900px;margin:0 auto;}
.card{background:var(--papel);padding:18px;box-shadow:0 3px 12px rgba(0,0,0,.12);}
.controls{display:flex;gap:14px;flex-wrap:wrap;align-items:flex-end;border-bottom:1px solid var(--claro);padding-bottom:14px;margin-bottom:14px;}
.fl{display:flex;flex-direction:column;gap:3px;}
.fl label{font-size:10px;letter-spacing:1px;color:var(--cinza);}
.fl input{font-family:inherit;font-size:15px;padding:7px 9px;border:1px solid #C4CCC7;border-radius:5px;width:110px;}
.fl.small input{width:70px;}
.fl.txt input{width:200px;}
.unit-toggle{display:flex;border:1px solid #C4CCC7;border-radius:5px;overflow:hidden;}
.unit-toggle button{font-family:inherit;font-size:12px;padding:7px 12px;border:none;background:#fff;cursor:pointer;color:var(--cinza);}
.unit-toggle button.on{background:var(--verde);color:#fff;}
.aviso{padding:9px 12px;border-radius:5px;font-size:12px;margin-bottom:12px;line-height:1.5;}
.aviso.warn{background:#FFF8E6;border:1px solid #E8D48A;color:#7A5B00;}
.aviso.err{background:#FDECEA;border:1px solid #E8B0AA;color:var(--erro);}
.aviso.info{background:var(--claro);color:#556;}
.resumo{display:flex;gap:22px;flex-wrap:wrap;font-size:12px;margin-bottom:14px;}
.resumo b{font-size:15px;display:block;font-family:'Arial Narrow',Arial,sans-serif;}
.romaneio{width:100%;border-collapse:collapse;font-size:12px;margin-bottom:8px;}
.romaneio th{text-align:left;font-size:9px;letter-spacing:1px;color:var(--cinza);border-bottom:1.5px solid var(--tinta);padding:5px 8px;}
.romaneio td{padding:6px 8px;border-bottom:1px solid var(--claro);}
.sw{display:inline-block;width:16px;height:16px;border-radius:3px;border:1px solid rgba(0,0,0,.2);vertical-align:middle;margin-right:7px;}
.romaneio .qt{text-align:center;font-weight:bold;}
.romaneio tfoot td{border-top:1.5px solid var(--tinta);border-bottom:none;font-weight:bold;}
.mapa-wrap{margin-top:16px;text-align:center;}
.sec{font-size:9px;letter-spacing:3px;color:var(--cinza);border-bottom:1px solid var(--claro);padding-bottom:4px;margin:18px 0 10px;}
.acoes{display:flex;gap:8px;margin-top:16px;flex-wrap:wrap;}
.acoes button{font-family:inherit;font-size:12px;padding:8px 14px;border:1px solid var(--verde);background:#fff;color:var(--verde);border-radius:5px;cursor:pointer;}
.acoes button:hover{background:var(--verde);color:#fff;}
.evt-panel{border:1px solid var(--claro);border-radius:6px;padding:12px 14px;margin-bottom:14px;background:#FAFBFA;}
.evt-panel .ph{font-size:9px;letter-spacing:2px;color:var(--cinza);margin-bottom:8px;}
.evt-panel .row{display:flex;gap:12px;flex-wrap:wrap;}
.evt-print{display:none;font-size:12px;border:1px solid #333;padding:10px 14px;margin-bottom:14px;line-height:1.7;}
.evt-print b{font-family:'Arial Narrow',Arial,sans-serif;}
.trelica-bloco{border:1px solid #C4CCC7;border-radius:6px;padding:14px;margin-bottom:18px;position:relative;}
.trelica-bloco .th{display:flex;align-items:center;gap:10px;margin-bottom:10px;flex-wrap:wrap;}
.trelica-bloco .th .num{background:var(--escuro);color:#fff;font-family:'Arial Narrow',Arial,sans-serif;font-weight:bold;padding:3px 10px;border-radius:4px;font-size:13px;}
.btn-rem{margin-left:auto;font-family:inherit;font-size:11px;border:1px solid #E8B0AA;background:#fff;color:var(--erro);border-radius:5px;padding:5px 10px;cursor:pointer;}
.btn-rem:hover{background:var(--erro);color:#fff;}
.btn-add{width:100%;font-family:inherit;font-size:13px;padding:11px;border:1.5px dashed var(--verde);background:#F3F8F5;color:var(--verde);border-radius:6px;cursor:pointer;margin-bottom:18px;}
.btn-add:hover{background:var(--verde);color:#fff;}
@media print{
  body{background:#fff;padding:0;}
  .controls,.acoes,.top,.btn-add,.btn-rem,.evt-panel{display:none;}
  .evt-print{display:block;}
  .card{box-shadow:none;}
  .trelica-bloco{page-break-inside:avoid;border:none;border-top:1px solid #999;border-radius:0;padding:14px 0;}
  #bloco-total{page-break-inside:avoid;}
}
</style>
</head>
<body>
<div class="wrap">
  <div class="top">
    <span class="m">PDVEX</span><small>MAPA DE MONTAGEM DE TRELIÇA · simulador</small>
  </div>
  <div class="card">

    <!-- DADOS DO EVENTO -->
    <div class="evt-panel">
      <div class="ph">DADOS DO EVENTO / PRODUÇÃO</div>
      <div class="row">
        <div class="fl txt"><label>EVENTO</label><input id="ev-nome" placeholder="Ex.: Feira X 2026" autocomplete="off"></div>
        <div class="fl"><label>DATA DE MONTAGEM</label><input id="ev-montagem" type="date"></div>
        <div class="fl"><label>DATA DO EVENTO</label><input id="ev-data" type="date"></div>
        <div class="fl"><label>RESPONSÁVEL GALPÃO</label><input id="ev-galpao" placeholder="Nome" autocomplete="off"></div>
        <div class="fl"><label>RESPONSÁVEL MONTADOR</label><input id="ev-montador" placeholder="Nome" autocomplete="off"></div>
      </div>
    </div>

    <div class="acoes-supa" style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px">
      <button id="btn-salvar" style="font-family:inherit;font-size:13px;padding:9px 16px;border:none;border-radius:6px;background:#2F6B50;color:#fff;cursor:pointer">💾 Salvar</button>
      <button id="btn-carregar" style="font-family:inherit;font-size:13px;padding:9px 16px;border:none;border-radius:6px;background:#5a5f6a;color:#fff;cursor:pointer">📂 Carregar</button>
      <span id="supa-msg" style="align-self:center;font-size:12px;color:#2F6B50"></span>
    </div>
    <div id="modal-carregar" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:100;align-items:flex-start;justify-content:center;padding:40px 16px">
      <div style="background:#fff;max-width:480px;width:100%;border-radius:8px;padding:18px;max-height:80vh;overflow:auto">
        <button id="modal-fechar" style="float:right;border:none;background:transparent;font-size:18px;cursor:pointer">✕</button>
        <h3 style="font-family:'Arial Narrow',Arial,sans-serif;margin-bottom:12px">Carregar montagem salva</h3>
        <div id="modal-lista" style="font-size:13px"></div>
      </div>
    </div>

    <div class="evt-print" id="evt-print"></div>

    <div class="controls">
      <div class="fl">
        <label>UNIDADE</label>
        <div class="unit-toggle">
          <button id="u-cm" class="on" data-u="cm">cm</button>
          <button id="u-m" data-u="m">m</button>
        </div>
      </div>
    </div>

    <div id="lista"></div>

    <button class="btn-add" id="btn-add">＋ Adicionar treliça neste evento</button>

    <!-- TOTAL CONSOLIDADO -->
    <div id="bloco-total"></div>

    <div class="acoes">
      <button onclick="window.print()">🖨 Imprimir mapa</button>
      <button onclick="copiarRomaneio()">📋 Copiar romaneio consolidado</button>
    </div>
  </div>
</div>

<script>
/* ═══════════════════════════════════════════════════════════════
   PDVEXTrelica — motor de decomposição + mapa SVG
   (mesmo bloco que será levado para o BOOK_Manager depois)
   ═══════════════════════════════════════════════════════════════ */
var PDVEXTrelica = (function(){
  var CUBO = 30;

  /* Catálogo default (espelha a tabela pdvex_trelica_pecas).
     No BOOK_Manager isto é substituído pelo que vier do Supabase. */
  var PECAS = [
    {t:30,tipo:'cubo', hex:'#1A1A1A',nome:'PRETO'},
    {t:40, tipo:'barra',hex:'#E6194B',nome:'VERMELHO'},
    {t:50, tipo:'barra',hex:'#F58231',nome:'LARANJA'},
    {t:60, tipo:'barra',hex:'#FFD100',nome:'AMARELO'},
    {t:70, tipo:'barra',hex:'#BFEF45',nome:'LIMAO'},
    {t:80, tipo:'barra',hex:'#3CB44B',nome:'VERDE'},
    {t:90, tipo:'barra',hex:'#469990',nome:'VERDE-AGUA'},
    {t:100,tipo:'barra',hex:'#42D4F4',nome:'CIANO'},
    {t:120,tipo:'barra',hex:'#4363D8',nome:'AZUL'},
    {t:140,tipo:'barra',hex:'#000075',nome:'MARINHO'},
    {t:150,tipo:'barra',hex:'#911EB4',nome:'ROXO'},
    {t:160,tipo:'barra',hex:'#C020C0',nome:'VIOLETA'},
    {t:170,tipo:'barra',hex:'#F032E6',nome:'MAGENTA'},
    {t:180,tipo:'barra',hex:'#FF69B4',nome:'ROSA'},
    {t:190,tipo:'barra',hex:'#9A6324',nome:'MARROM'},
    {t:200,tipo:'barra',hex:'#808000',nome:'OLIVA'},
    {t:230,tipo:'barra',hex:'#A9A9A9',nome:'CINZA'},
    {t:240,tipo:'barra',hex:'#FF7F50',nome:'CORAL'},
    {t:300,tipo:'barra',hex:'#800000',nome:'VINHO'}
  ];

  function porTamanho(t){
    for(var i=0;i<PECAS.length;i++) if(PECAS[i].t===t) return PECAS[i];
    return {t:t,tipo:'barra',hex:'#666',nome:'?'+t};
  }
  function barras(){ var r=[]; for(var i=0;i<PECAS.length;i++) if(PECAS[i].tipo==='barra') r.push(PECAS[i].t); return r; }

  /* Núcleo puro: tenta fechar um vão (cm) no MENOR nº de barras (coin-change DP). */
  function fecharVao(vao){
    if(vao===0) return [];
    if(vao<0)   return null;
    var B = barras(), INF = 1e9;
    var dp = [0], esc = [-1];
    for(var v=1; v<=vao; v++){
      dp[v]=INF; esc[v]=-1;
      for(var k=0;k<B.length;k++){
        var c=B[k];
        if(v-c>=0 && dp[v-c]+1<dp[v]){ dp[v]=dp[v-c]+1; esc[v]=c; }
      }
    }
    if(dp[vao]>=INF) return null;
    var lista=[], r=vao;
    while(r>0){ lista.push(esc[r]); r-=esc[r]; }
    lista.sort(function(a,b){return b-a;});
    return lista;
  }

  function decomporVao(vao){
    var l = fecharVao(vao);
    if(l) return {ok:true, barras:l};
    var motivo = vao<0
      ? 'estrutura menor que os dois cubos (mín. 60cm por lado)'
      : 'vão de '+vao+'cm não fecha com as peças do estoque';
    return {ok:false, motivo:motivo, sugestoes:vaosProximos(vao)};
  }

  function vaosProximos(vao){
    var achaveis=[], d;
    for(d=1; d<=120; d++){ if(vao-d>=0 && fecharVao(vao-d)){ achaveis.push(vao-d); break; } }
    for(d=1; d<=120; d++){ if(fecharVao(vao+d)){ achaveis.push(vao+d); break; } }
    return achaveis;
  }

  function somaArr(a){ var s=0; for(var i=0;i<a.length;i++) s+=a[i]; return s; }

  function decompor(W, H, nDiv, mH, mV){
    nDiv = (nDiv===2||nDiv===3||nDiv===4) ? nDiv : 1;   /* divisões no eixo horizontal */
    var nRef = nDiv>1 ? nDiv-1 : 0;                      /* reforços verticais internos */
    var vaoH = W - 2*CUBO;
    var vaoV = H - 2*CUBO;
    var dH = decomporVao(vaoH);
    var dV = decomporVao(vaoV);
    var avisos=[];

    /* override manual: se veio lista de peças do usuário, ela manda */
    var manH = Array.isArray(mH);
    var manV = Array.isArray(mV);
    var arestaH = manH ? mH.slice() : (dH.ok ? dH.barras : null);
    var arestaV = manV ? mV.slice() : (dV.ok ? dV.barras : null);
    var somaH = arestaH ? somaArr(arestaH) : 0;
    var somaV = arestaV ? somaArr(arestaV) : 0;
    var okH = manH ? (somaH===vaoH) : dH.ok;
    var okV = manV ? (somaV===vaoV) : dV.ok;

    if(manH && !okH){
      var difH = vaoH - somaH;
      avisos.push('Peças horizontais (manual): somam '+somaH+'cm, vão é '+vaoH+'cm — '+(difH>0?'faltam '+difH+'cm':'sobram '+(-difH)+'cm')+'.');
    }
    if(manV && !okV){
      var difV = vaoV - somaV;
      avisos.push('Peças verticais (manual): somam '+somaV+'cm, vão é '+vaoV+'cm — '+(difV>0?'faltam '+difV+'cm':'sobram '+(-difV)+'cm')+'.');
    }
    if(!manH && !dH.ok) avisos.push('Largura: '+dH.motivo+(dH.sugestoes&&dH.sugestoes.length?' — larguras ok próximas: '+dH.sugestoes.map(function(v){return (v+60)+'cm';}).join(' ou '):'')+' Você pode montar a composição manualmente abaixo.');
    if(!manV && !dV.ok) avisos.push('Altura: '+dV.motivo+(dV.sugestoes&&dV.sugestoes.length?' — alturas ok próximas: '+dV.sugestoes.map(function(v){return (v+60)+'cm';}).join(' ou '):'')+' Você pode montar a composição manualmente abaixo.');

    if(nRef>0 && !arestaV) avisos.push('Reforço: depende do vão vertical, que não fecha — ajuste a altura ou monte a vertical manualmente.');

    var tally={};
    tally[CUBO]=4;
    function add(arr,mult){ for(var i=0;i<arr.length;i++){ tally[arr[i]]=(tally[arr[i]]||0)+mult; } }
    if(arestaH) add(arestaH,2);
    if(arestaV) add(arestaV,2);
    if(arestaV && nRef>0) add(arestaV,nRef);   /* reforços verticais internos, sem cubo */

    var pecas=[];
    Object.keys(tally).map(Number).sort(function(a,b){return a-b;}).forEach(function(t){
      var p=porTamanho(t);
      pecas.push({tamanho:t, tipo:p.tipo, hex:p.hex, nome:p.nome, qtd:tally[t]});
    });

    return {
      W:W, H:H, vaoH:vaoH, vaoV:vaoV,
      arestaH: arestaH,
      arestaV: arestaV,
      okH:okH, okV:okV,
      manH:manH, manV:manV, somaH:somaH, somaV:somaV,
      autoH:(dH.ok?dH.barras:null), autoV:(dV.ok?dV.barras:null),
      nDiv:nDiv, nRef:(arestaV?nRef:0),
      pecas:pecas, avisos:avisos,
      totalPecas: pecas.reduce(function(a,p){return a+p.qtd;},0)
    };
  }

  function textoSobre(hex){
    var h=hex.replace('#',''); if(h.length===3){h=h[0]+h[0]+h[1]+h[1]+h[2]+h[2];}
    var r=parseInt(h.substr(0,2),16),g=parseInt(h.substr(2,2),16),b=parseInt(h.substr(4,2),16);
    var lum=(0.299*r+0.587*g+0.114*b);
    return lum>150?'#111':'#fff';
  }

  function mapaSVG(d){
    var W=d.W, H=d.H;
    var maxW=660, maxH=440;
    var s=Math.min(maxW/W, maxH/H); if(s>3)s=3; if(s<0.35)s=0.35;
    var mge=58, mgt=30, mgd=26, mgb=44;
    var pw=W*s, ph=H*s, c=CUBO*s;
    var x0=mge, y0=mgt;
    var totalW=pw+mge+mgd, totalH=ph+mgt+mgb;
    var svg='<svg width="100%" viewBox="0 0 '+totalW+' '+totalH+'" xmlns="http://www.w3.org/2000/svg" style="max-width:'+Math.min(totalW,720)+'px">';

    svg+='<rect x="'+(x0+c)+'" y="'+(y0+c)+'" width="'+(pw-2*c)+'" height="'+(ph-2*c)+'" fill="#F5F8F6" stroke="#E0E5E2"/>';

    function barra(x,y,w,h,tam,horizontal){
      var p=porTamanho(tam), tc=textoSobre(p.hex);
      var g='<g>';
      g+='<rect x="'+x+'" y="'+y+'" width="'+w+'" height="'+h+'" fill="'+p.hex+'" stroke="#222" stroke-width="0.8"/>';
      g+='<line x1="'+x+'" y1="'+y+'" x2="'+(x+w)+'" y2="'+(y+h)+'" stroke="'+tc+'" stroke-width="0.5" opacity="0.28"/>';
      g+='<line x1="'+(x+w)+'" y1="'+y+'" x2="'+x+'" y2="'+(y+h)+'" stroke="'+tc+'" stroke-width="0.5" opacity="0.28"/>';
      var cx=x+w/2, cy=y+h/2;
      var fs=Math.max(8, Math.min(13, (horizontal?w:h)*0.32));
      if(fs>7){
        g+='<text x="'+cx+'" y="'+cy+'" font-family="Arial" font-size="'+fs+'" font-weight="bold" fill="'+tc+'" text-anchor="middle" dominant-baseline="central"'+(horizontal?'':' transform="rotate(-90 '+cx+' '+cy+')"')+'>'+tam+'</text>';
      }
      return g+'</g>';
    }
    function cubo(x,y){
      var p=porTamanho(CUBO), tc=textoSobre(p.hex);
      return '<g><rect x="'+x+'" y="'+y+'" width="'+c+'" height="'+c+'" fill="'+p.hex+'" stroke="#000" stroke-width="1"/>'+
        (c>16?'<text x="'+(x+c/2)+'" y="'+(y+c/2)+'" font-family="Arial" font-size="'+Math.max(7,c*0.34)+'" fill="'+tc+'" text-anchor="middle" dominant-baseline="central">30</text>':'')+'</g>';
    }

    if(d.arestaH){
      var xs=x0+c;
      for(var i=0;i<d.arestaH.length;i++){ var w=d.arestaH[i]*s;
        svg+=barra(xs,y0,w,c,d.arestaH[i],true);
        svg+=barra(xs,y0+ph-c,w,c,d.arestaH[i],true);
        xs+=w;
      }
      if(d.manH && d.somaH<d.vaoH){
        var gw=(d.vaoH-d.somaH)*s;
        svg+='<rect x="'+xs+'" y="'+y0+'" width="'+gw+'" height="'+c+'" fill="#FDECEA" stroke="#C0392B" stroke-dasharray="4 3"/>';
        svg+='<rect x="'+xs+'" y="'+(y0+ph-c)+'" width="'+gw+'" height="'+c+'" fill="#FDECEA" stroke="#C0392B" stroke-dasharray="4 3"/>';
      }
    } else {
      svg+='<rect x="'+(x0+c)+'" y="'+y0+'" width="'+(pw-2*c)+'" height="'+c+'" fill="#FDECEA" stroke="#C0392B" stroke-dasharray="4 3"/>';
      svg+='<rect x="'+(x0+c)+'" y="'+(y0+ph-c)+'" width="'+(pw-2*c)+'" height="'+c+'" fill="#FDECEA" stroke="#C0392B" stroke-dasharray="4 3"/>';
    }
    if(d.arestaV){
      var ys=y0+c;
      for(var j=0;j<d.arestaV.length;j++){ var hh=d.arestaV[j]*s;
        svg+=barra(x0,ys,c,hh,d.arestaV[j],false);
        svg+=barra(x0+pw-c,ys,c,hh,d.arestaV[j],false);
        ys+=hh;
      }
      if(d.manV && d.somaV<d.vaoV){
        var gv=(d.vaoV-d.somaV)*s;
        svg+='<rect x="'+x0+'" y="'+ys+'" width="'+c+'" height="'+gv+'" fill="#FDECEA" stroke="#C0392B" stroke-dasharray="4 3"/>';
        svg+='<rect x="'+(x0+pw-c)+'" y="'+ys+'" width="'+c+'" height="'+gv+'" fill="#FDECEA" stroke="#C0392B" stroke-dasharray="4 3"/>';
      }
    } else {
      svg+='<rect x="'+x0+'" y="'+(y0+c)+'" width="'+c+'" height="'+(ph-2*c)+'" fill="#FDECEA" stroke="#C0392B" stroke-dasharray="4 3"/>';
      svg+='<rect x="'+(x0+pw-c)+'" y="'+(y0+c)+'" width="'+c+'" height="'+(ph-2*c)+'" fill="#FDECEA" stroke="#C0392B" stroke-dasharray="4 3"/>';
    }

    if(d.arestaV && d.nRef>0){
      for(var rk=1; rk<d.nDiv; rk++){
        var xc = x0 + c + (pw-2*c)*(rk/d.nDiv);
        var xr = xc - c/2;
        var ys2 = y0+c;
        for(var vj=0; vj<d.arestaV.length; vj++){
          var hh2 = d.arestaV[vj]*s;
          svg+=barra(xr, ys2, c, hh2, d.arestaV[vj], false);
          ys2+=hh2;
        }
      }
    }

    svg+=cubo(x0,y0)+cubo(x0+pw-c,y0)+cubo(x0,y0+ph-c)+cubo(x0+pw-c,y0+ph-c);

    var cy=y0+ph+18;
    svg+='<line x1="'+x0+'" y1="'+cy+'" x2="'+(x0+pw)+'" y2="'+cy+'" stroke="#3A4540"/>';
    svg+='<text x="'+(x0+pw/2)+'" y="'+(cy+14)+'" font-family="Courier New" font-size="11" fill="#3A4540" text-anchor="middle">'+W+' cm</text>';
    var cx2=x0-16;
    svg+='<line x1="'+cx2+'" y1="'+y0+'" x2="'+cx2+'" y2="'+(y0+ph)+'" stroke="#3A4540"/>';
    svg+='<text x="'+(cx2-6)+'" y="'+(y0+ph/2)+'" font-family="Courier New" font-size="11" fill="#3A4540" text-anchor="middle" transform="rotate(-90 '+(cx2-6)+' '+(y0+ph/2)+')">'+H+' cm</text>';

    svg+='</svg>';
    return svg;
  }

  return { CUBO:CUBO, PECAS:PECAS, decompor:decompor, mapaSVG:mapaSVG, porTamanho:porTamanho, textoSobre:textoSobre };
})();

var UNID='cm';
var _seq=1;
var _decomps=[];                  /* último resultado de cada uma */
var trelicas=[ novaTrelica() ];   /* lista de treliças do evento */

function novaTrelica(){
  return { id:_seq++, nome:'', L:'500', A:'300', sng:'10', qtd:'1', ref:'0', mH:null, mV:null };
}

function num(v){ var n=parseFloat(String(v).replace(',','.')); return isNaN(n)?0:n; }
function paraCm(v){ return UNID==='m'? Math.round(num(v)*100) : Math.round(num(v)); }
function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function fmtData(iso){
  if(!iso) return '';
  var p=iso.split('-'); if(p.length!==3) return iso;
  return p[2]+'/'+p[1]+'/'+p[0];
}

/* ── cálculo e saída de UMA treliça ── */
function atualizarTrelica(t, idx){
  var W=paraCm(t.L), H=paraCm(t.A), sng=num(t.sng), qtd=Math.max(1,Math.round(num(t.qtd))||1);
  var out=document.getElementById('saida-'+t.id);
  if(!out) return;
  if(W<=0||H<=0){ out.innerHTML='<div class="aviso info">Informe largura e altura da estrutura.</div>'; _decomps[idx]=null; return; }

  var nDiv=parseInt(t.ref,10); if(!(nDiv===2||nDiv===3||nDiv===4)) nDiv=1;
  var d=PDVEXTrelica.decompor(W,H,nDiv,t.mH,t.mV);
  d.qtd=qtd; d.nome=t.nome; d.sng=sng;
  _decomps[idx]=d;
  var artL=W+2*sng, artA=H+2*sng;
  var html='';

  d.avisos.forEach(function(a){ html+='<div class="aviso err">⚠ '+a+'</div>'; });

  html+='<div class="resumo">'+
    '<div><span style="color:var(--cinza);font-size:10px">ESTRUTURA (treliça)</span><b>'+W+' × '+H+' cm</b></div>'+
    '<div><span style="color:var(--cinza);font-size:10px">ARTE (c/ sangria '+sng+'/lado)</span><b>'+artL+' × '+artA+' cm</b></div>'+
    '<div><span style="color:var(--cinza);font-size:10px">VÃO HORIZONTAL</span><b>'+d.vaoH+' cm</b></div>'+
    '<div><span style="color:var(--cinza);font-size:10px">VÃO VERTICAL</span><b>'+d.vaoV+' cm</b></div>'+
    '<div><span style="color:var(--cinza);font-size:10px">QUANTIDADE</span><b>×'+qtd+'</b></div>'+
    '<div><span style="color:var(--cinza);font-size:10px">PEÇAS/UNID</span><b>'+d.totalPecas+'</b></div>'+
    (d.nRef>0?'<div><span style="color:var(--cinza);font-size:10px">REFORÇOS (vert.)</span><b>'+d.nRef+' × '+d.vaoV+'cm</b></div>':'')+
  '</div>';

  html+='<div class="aviso info">A treliça usa a medida da <b>estrutura</b> ('+W+'×'+H+'). A sangria de '+sng+'cm/lado entra só na <b>arte</b> ('+artL+'×'+artA+'), nunca na estrutura.'+(qtd>1?' Romaneio abaixo é <b>por unidade</b> — o total das '+qtd+' entra na tabela consolidada.':'')+'</div>';

  html+='<div class="sec">R O M A N E I O &nbsp; ( P O R &nbsp; U N I D A D E )</div>';
  html+='<table class="romaneio"><thead><tr><th>PEÇA</th><th>COR / ETIQUETA</th><th style="text-align:center">QTD</th><th style="text-align:right">TOTAL LINEAR</th></tr></thead><tbody>';
  d.pecas.forEach(function(p){
    html+='<tr>'+
      '<td><b>'+(p.tipo==='cubo'?'CUBO 30×30':p.tamanho+' cm')+'</b></td>'+
      '<td><span class="sw" style="background:'+p.hex+'"></span>'+p.nome+'</td>'+
      '<td class="qt">'+p.qtd+'</td>'+
      '<td style="text-align:right;color:#777">'+(p.tamanho*p.qtd/100).toFixed(2).replace('.',',')+' m</td>'+
    '</tr>';
  });
  html+='</tbody></table>';
  if(d.arestaH && d.arestaH.length) html+='<div style="font-size:11px;color:#777">Cada aresta horizontal (×2): '+d.arestaH.join(' + ')+' = '+(d.manH?d.somaH:d.vaoH)+'cm · Cada vertical (×2): '+(d.arestaV&&d.arestaV.length?d.arestaV.join(' + '):'—')+' = '+(d.manV?d.somaV:d.vaoV)+'cm'+(d.nRef>0?' · '+d.nRef+' reforço(s) vertical(is) idêntico(s) à vertical, sem cubo':'')+'</div>';

  html+='<div class="sec">C O M P O S I Ç Ã O &nbsp; D A S &nbsp; A R E S T A S</div>';
  html+=editorEixo(t, d, 'H');
  html+=editorEixo(t, d, 'V');

  html+='<div class="sec">M A P A &nbsp; D E &nbsp; M O N T A G E M</div>';
  html+='<div class="mapa-wrap">'+PDVEXTrelica.mapaSVG(d)+'</div>';

  out.innerHTML=html;
}

/* ── tabela consolidada do evento (todas as treliças × qtd) ── */
function consolidar(){
  var tally={};
  for(var i=0;i<_decomps.length;i++){
    var d=_decomps[i];
    if(!d) continue;
    for(var j=0;j<d.pecas.length;j++){
      var p=d.pecas[j];
      tally[p.tamanho]=(tally[p.tamanho]||0)+p.qtd*d.qtd;
    }
  }
  var lista=[];
  Object.keys(tally).map(Number).sort(function(a,b){return a-b;}).forEach(function(t){
    var p=PDVEXTrelica.porTamanho(t);
    lista.push({tamanho:t, tipo:p.tipo, hex:p.hex, nome:p.nome, qtd:tally[t]});
  });
  return lista;
}

function atualizarTotal(){
  var lista=consolidar();
  var out=document.getElementById('bloco-total');
  if(!lista.length){ out.innerHTML=''; return; }
  var totPecas=0, totLin=0, totTrel=0;
  for(var i=0;i<_decomps.length;i++){ if(_decomps[i]) totTrel+=_decomps[i].qtd; }
  var html='<div class="sec">T O T A L &nbsp; D O &nbsp; E V E N T O &nbsp; · &nbsp; '+totTrel+' &nbsp; T R E L I Ç A ( S )</div>';
  html+='<table class="romaneio"><thead><tr><th>PEÇA</th><th>COR / ETIQUETA</th><th style="text-align:center">QTD TOTAL</th><th style="text-align:right">TOTAL LINEAR</th></tr></thead><tbody>';
  lista.forEach(function(p){
    totPecas+=p.qtd; totLin+=p.tamanho*p.qtd/100;
    html+='<tr>'+
      '<td><b>'+(p.tipo==='cubo'?'CUBO 30×30':p.tamanho+' cm')+'</b></td>'+
      '<td><span class="sw" style="background:'+p.hex+'"></span>'+p.nome+'</td>'+
      '<td class="qt">'+p.qtd+'</td>'+
      '<td style="text-align:right;color:#777">'+(p.tamanho*p.qtd/100).toFixed(2).replace('.',',')+' m</td>'+
    '</tr>';
  });
  html+='</tbody><tfoot><tr><td colspan="2">TOTAL GERAL</td><td class="qt">'+totPecas+'</td><td style="text-align:right">'+totLin.toFixed(2).replace('.',',')+' m</td></tr></tfoot></table>';
  out.innerHTML=html;
}

/* ── romaneio consolidado (texto) ── */
function copiarRomaneio(){
  var lista=consolidar();
  if(!lista.length) return;
  var nome=document.getElementById('ev-nome').value;
  var t='ROMANEIO CONSOLIDADO'+(nome?' — '+nome:'')+'\n';
  for(var i=0;i<_decomps.length;i++){
    var d=_decomps[i];
    if(!d) continue;
    t+='· Treliça '+(i+1)+(d.nome?' ('+d.nome+')':'')+': '+d.W+'x'+d.H+'cm ×'+d.qtd+'\n';
  }
  t+='---\n';
  var tot=0;
  lista.forEach(function(p){ tot+=p.qtd; t+=(p.tipo==='cubo'?'CUBO 30':p.tamanho+'cm')+'  ['+p.nome+']  x'+p.qtd+'\n'; });
  t+='TOTAL: '+tot+' peças';
  navigator.clipboard.writeText(t).then(function(){ alert('Romaneio consolidado copiado.'); });
}

/* ── eventos (delegação) ── */
function achaIdx(id){ for(var i=0;i<trelicas.length;i++) if(trelicas[i].id===id) return i; return -1; }

document.getElementById('lista').addEventListener('input',function(e){
  var a=e.target.getAttribute('data-action'); if(!a) return;
  var id=parseInt(e.target.getAttribute('data-id'),10);
  var i=achaIdx(id); if(i<0) return;
  var t=trelicas[i];
  if(a==='t-nome') t.nome=e.target.value;
  if(a==='t-L')    t.L=e.target.value;
  if(a==='t-A')    t.A=e.target.value;
  if(a==='t-sng')  t.sng=e.target.value;
  if(a==='t-qtd')  t.qtd=e.target.value;
  atualizarTrelica(t,i);
  atualizarTotal();
});

function listaManual(t, i, eixo){
  var key = eixo==='H' ? 'mH' : 'mV';
  if(Array.isArray(t[key])) return t[key];   /* já é manual (mesmo vazio) → mantém */
  var d=_decomps[i];
  var base = d ? (eixo==='H' ? d.arestaH : d.arestaV) : null;
  t[key] = base ? base.slice() : [];          /* semeia da sugestão automática atual */
  return t[key];
}

document.getElementById('lista').addEventListener('change',function(e){
  var a=e.target.getAttribute('data-action'); if(!a) return;
  var id=parseInt(e.target.getAttribute('data-id'),10);
  var i=achaIdx(id); if(i<0) return;
  var t=trelicas[i];
  if(a==='t-ref'){ t.ref=e.target.value; }
  else if(a==='pc-add'){
    var val=parseInt(e.target.value,10);
    if(!val){ return; }
    var eixo=e.target.getAttribute('data-eixo');
    listaManual(t,i,eixo).push(val);
  }
  else return;
  atualizarTrelica(t,i);
  atualizarTotal();
});

document.getElementById('lista').addEventListener('click',function(ev){
  var el=ev.target.closest?ev.target.closest('[data-action="pc-rem"],[data-action="pc-auto"]'):null;

  var a=el.getAttribute('data-action');

  var t=trelicas[i];

    var lst=listaManual(t,i,eixo);

    lst.splice(idx,1);
    /* fica em manual mesmo vazio: aresta em vermelho até você recompor.
       Pra voltar à sugestão original use o botão ↺ Automático. */

  atualizarTrelica(t,i);
  atualizarTotal();
});

}
function salvarMontagem(){
  var nome=evId('ev-nome').trim();
  if(!nome){ supaMsg('Preencha o campo EVENTO antes de salvar.'); document.getElementById('ev-nome').focus(); return; }
  var estado=coletarEstado();
  var registro={ job_numero:nome, peca_nome:'EVENTO ('+trelicas.length+' treliças)', mapa:estado };
  fetch(SUPA_URL+'/rest/v1/pdvex_trelica_montagens?job_numero=eq.'+encodeURIComponent(nome)+'&deletado_em=is.null&select=id',
    {headers:supaHeaders()})
  .then(function(r){return r.json();})
  .then(function(rows){
    if(rows&&rows.length){
      return fetch(SUPA_URL+'/rest/v1/pdvex_trelica_montagens?id=eq.'+rows[0].id,
        {method:'PATCH',headers:supaHeaders({'Prefer':'return=minimal'}),body:JSON.stringify(registro)});
    }
    return fetch(SUPA_URL+'/rest/v1/pdvex_trelica_montagens',
      {method:'POST',headers:supaHeaders({'Prefer':'return=minimal'}),body:JSON.stringify(registro)});
  })
  .then(function(r){ if(r.ok) supaMsg('Salvo: "'+nome+'" ✓'); else r.text().then(function(t){supaMsg('Erro ao salvar: '+t.slice(0,80));}); })
  .catch(function(e){ supaMsg('Falha de rede: '+e.message); });
}
function abrirCarregar(){
  var modal=document.getElementById('modal-carregar');
  modal.style.display='flex';
  document.getElementById('modal-lista').innerHTML='<div style="color:#8A938E">Carregando…</div>';
  fetch(SUPA_URL+'/rest/v1/pdvex_trelica_montagens?deletado_em=is.null&select=id,job_numero,peca_nome,criado_em&order=criado_em.desc',
    {headers:supaHeaders()})
  .then(function(r){return r.json();})
  .then(function(rows){
    if(!rows||!rows.length){ document.getElementById('modal-lista').innerHTML='<div style="color:#8A938E">Nenhuma montagem salva ainda.</div>'; return; }
    var h='';
    rows.forEach(function(row){
      var dt=row.criado_em?row.criado_em.slice(0,10).split('-').reverse().join('/'):'';
      h+='<div style="display:flex;justify-content:space-between;align-items:center;gap:8px;padding:9px 6px;border-bottom:1px solid #EDEFEE">'
        +'<div><b>'+esc(row.job_numero)+'</b><br><small style="color:#8A938E">'+esc(row.peca_nome||'')+' · '+dt+'</small></div>'
        +'<button data-load-id="'+row.id+'" style="border:none;background:#2F6B50;color:#fff;border-radius:5px;padding:6px 12px;cursor:pointer;font-family:inherit">Abrir</button>'
        +'</div>';
    });
    document.getElementById('modal-lista').innerHTML=h;
  })
  .catch(function(e){ document.getElementById('modal-lista').innerHTML='<div style="color:#C0392B">Erro: '+esc(e.message)+'</div>'; });
}
function carregarId(id){
  fetch(SUPA_URL+'/rest/v1/pdvex_trelica_montagens?id=eq.'+id+'&select=mapa',{headers:supaHeaders()})
  .then(function(r){return r.json();})
  .then(function(rows){
    if(rows&&rows.length&&rows[0].mapa){ aplicarEstado(rows[0].mapa); document.getElementById('modal-carregar').style.display='none'; supaMsg('Carregado ✓'); }
    else supaMsg('Registro sem dados.');
  })
  .catch(function(e){ supaMsg('Erro ao carregar: '+e.message); });
}
document.getElementById('btn-salvar').addEventListener('click',salvarMontagem);
document.getElementById('btn-carregar').addEventListener('click',abrirCarregar);
document.getElementById('modal-fechar').addEventListener('click',function(){document.getElementById('modal-carregar').style.display='none';});
document.getElementById('modal-carregar').addEventListener('click',function(e){ if(e.target===this) this.style.display='none'; });
document.getElementById('modal-lista').addEventListener('click',function(e){
  var b=e.target.closest?e.target.closest('[data-load-id]'):null;
  if(b) carregarId(b.getAttribute('data-load-id'));
});

renderLista();
atualizarEvtPrint();
</script>
</body>
